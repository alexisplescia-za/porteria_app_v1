}

function AutoInput({options=[],value,onChange,placeholder,error}){
  const[open,setOpen]=useState(false);
  const[focused,setFocused]=useState(false);
  const[pos,setPos]=useState({top:0,left:0,width:0});
  const inputRef=React.useRef(null);
  const q=(value||"").toLowerCase().trim();
  const filtered=useMemo(()=>{
    if(q.length>0) return options.filter(o=>o.toLowerCase().includes(q)&&o!==value).slice(0,15);
    return options.slice(0,10);
  },[options,q,value]);
  const show=open&&focused&&filtered.length>0;

  const updatePos=React.useCallback(()=>{
    if(inputRef.current){
      // Sube por el DOM sumando offsetTop/offsetLeft para evitar problemas con transform en ancestros
      let el=inputRef.current,top=0,left=0;
      const rect=el.getBoundingClientRect();
      top=rect.bottom+window.scrollY+2;
      left=rect.left+window.scrollX;
      setPos({top,left,width:rect.width});
    }
  },[]);

  React.useLayoutEffect(()=>{
    if(show) updatePos();
  },[show]);

  React.useEffect(()=>{
    if(!show) return;
    const onScroll=()=>updatePos();
    window.addEventListener("scroll",onScroll,true);
    window.addEventListener("resize",updatePos);
    return()=>{
      window.removeEventListener("scroll",onScroll,true);
      window.removeEventListener("resize",updatePos);
    };
  },[show,updatePos]);

  const dropStyle={
    position:"absolute",
    top:pos.top+"px",
    left:pos.left+"px",
    width:pos.width+"px",
    zIndex:99999,
    background:"#1c1f30",
    border:"1px solid var(--border-light)",
    borderRadius:"var(--radius)",
    maxHeight:"260px",
    overflowY:"auto",
    boxShadow:"0 8px 24px rgba(0,0,0,0.5)",
  };

  return(
    <div style={{position:"relative"}}>
      <input ref={inputRef}
        style={{...d.input,borderColor:error?"var(--red-dark)":undefined}}
        value={value}
        onChange={e=>{onChange(e.target.value);setOpen(true);updatePos();}}
        onFocus={()=>{setFocused(true);setOpen(true);updatePos();}}
        onBlur={()=>setTimeout(()=>setFocused(false),160)}
        placeholder={placeholder}/>
      {show&&ReactDOM.createPortal(
        <div style={dropStyle}>
          {filtered.map(opt=>(
            <div key={opt}
              onMouseDown={()=>{onChange(opt);setOpen(false);}}
              style={{padding:"9px 13px",cursor:"pointer",fontSize:"13px",color:"var(--text)",borderBottom:"1px solid var(--border)"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--bg-hover)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              {opt}
            </div>
          ))}
          {q.length===0&&options.length>10&&(
            <div style={{padding:"6px 13px",fontSize:"11px",color:"var(--text-muted)",borderTop:"1px solid var(--border)",textAlign:"center"}}>
              Escribí para buscar entre {options.length} opciones...
            </div>
          )}
        </div>,
        document.body
      )}
      {error&&<span style={d.err}>{error}</span>}
    </div>
  );
}

function Toggle({checked,onChange,label,accent}){

      </div>
      <span style={{fontSize:"13px",color:checked?"var(--text)":"var(--text-muted)",fontWeight:checked?600:400}}>{label}</span>

/* ═══════════════════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════════════════ */
function LoginScreen({onLogin}){
  const[usr,setUsr]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  const go=async(e)=>{
    e.preventDefault();setErr("");setLoading(true);
    try{
      const res=await fetch(`${BACKEND_URL}/api/usuarios/login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:usr,password:pw})});
      const data=await res.json();
      if(data.ok){
        onLogin({id:data.usuario.id,user:data.usuario.username,role:data.usuario.rol,name:data.usuario.username});
      } else {
        // fallback a usuarios locales
        const f=USERS.find(u=>u.user===usr&&u.pass===pw);
        f?onLogin(f):setErr(data.error||"Usuario o contraseña incorrectos");
      }
    } catch {
      // sin conexión al backend — usar usuarios locales
      const f=USERS.find(u=>u.user===usr&&u.pass===pw);
      f?onLogin(f):setErr("Sin conexión al servidor. Verificá que el backend esté corriendo.");
    } finally {setLoading(false);}
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg-deep)",padding:"20px"}}>
      <div style={{marginBottom:"36px",textAlign:"center"}}>
        <div style={{marginBottom:"16px",display:"flex",justifyContent:"center"}}>
          <CarrefourLogo size={40}/>
        </div>
        <div style={{fontSize:"13px",color:"var(--text-muted)",marginTop:"6px"}}>Sistema de Control de Acceso — Portería</div>
      </div>
      <div style={{...d.card,width:"100%",maxWidth:"380px",boxShadow:"0 20px 60px rgba(0,0,0,0.6)"}}>
        <div style={{textAlign:"center",marginBottom:"24px"}}>
          <div style={{fontSize:"32px",marginBottom:"8px"}}>🛡️</div>
          <div style={{fontSize:"18px",fontWeight:700,color:"var(--text)"}}>Iniciar Sesión</div>
        </div>
        <form onSubmit={go}>
          <div style={d.sec}><label style={d.label}>Usuario</label><input style={d.input} value={usr} onChange={e=>setUsr(e.target.value)} placeholder="Ingresá tu usuario" autoFocus/></div>
          <div style={{...d.sec,marginBottom:"20px"}}><label style={d.label}>Contraseña</label><input style={d.input} type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"/></div>
          {err&&<p style={{...d.err,marginBottom:"12px"}}>{err}</p>}
          <button type="submit" disabled={loading} style={{...d.btnPrimary,width:"100%",padding:"12px",fontSize:"15px",opacity:loading?.6:1}}>{loading?"Verificando...":"Ingresar al Sistema"}</button>
        </form>
      </div>
      <div style={{marginTop:"40px",fontSize:"11px",color:"var(--text-dim)"}}>desarrollado por alexis plescia en 2026</div>
    </div>
  );
}

   SIDEBAR

const NAV=[{id:"dashboard",label:"Dashboard",icon:"🏠"},{id:"analytics",label:"Analytics",icon:"📊"},{id:"nueva",label:"Nueva Operación",icon:"➕"},{id:"generadores",label:"Grupos Electrógenos",icon:"⚡"},{id:"historial",label:"Historial",icon:"📋"},{id:"tempranos",label:"Egresos Tempranos",icon:"⏱️"}];
function Sidebar({view,setView,user,onLogout,sidebarOpen}){
  const nb=(item,accentColor)=>{
    const active=view===item.id;
    const ac=accentColor||"var(--accent)";
    return(
      <button key={item.id} onClick={()=>setView(item.id)} style={{display:"flex",alignItems:"center",gap:"10px",width:"100%",padding:"9px 12px",borderRadius:"var(--radius)",border:"none",background:active?`color-mix(in srgb, ${ac} 15%, transparent)`:"transparent",color:active?ac:"var(--text-muted)",fontWeight:active?700:400,fontSize:"13px",cursor:"pointer",textAlign:"left",marginBottom:"2px",borderLeft:active?`2px solid ${ac}`:"2px solid transparent",transition:"all .15s"}}>
        <span style={{fontSize:"15px",lineHeight:1}}>{item.icon}</span>{item.label}
      </button>
    );
  };
  return(
    <aside className={`sidebar${sidebarOpen?" open":""}`} style={{width:"var(--sidebar-w)",minHeight:"100vh",background:"var(--bg-sidebar)",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",position:"fixed",left:0,top:0,bottom:0,zIndex:10}}>
      <div style={{padding:"18px 16px 14px",borderBottom:"1px solid var(--border)"}}>
        <CarrefourLogo size={28}/>
        <div style={{fontSize:"11px",color:"var(--text-muted)",marginTop:"6px"}}>Control de Acceso</div>
      </div>
      <nav style={{flex:1,padding:"12px 8px",overflowY:"auto"}}>
        {NAV.map(item=>nb(item))}
        <div style={{height:"1px",background:"var(--border)",margin:"10px 4px"}}/>
        {user.role==="admin"&&nb({id:"admin",icon:"⚙️",label:"Administración"},"var(--purple)")}
      </nav>
      <div style={{padding:"14px",borderTop:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"9px",marginBottom:"10px"}}>
          <div style={{width:"32px",height:"32px",borderRadius:"50%",background:"var(--blue-bg)",border:"1px solid var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",fontWeight:700,color:"var(--accent)",flexShrink:0}}>{user.name[0]}</div>
          <div><div style={{fontSize:"13px",fontWeight:600,color:"var(--text)"}}>{user.name}</div><div style={{fontSize:"11px",color:"var(--text-muted)",textTransform:"capitalize"}}>{user.role}</div></div>
        </div>
        <button onClick={onLogout} style={{...d.btnGhost,width:"100%",fontSize:"12px",padding:"7px"}}>Cerrar sesión</button>
      </div>
    </aside>
  );
}

/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */
function Dashboard({registros,setView}){
  const today=new Date().toDateString();
  const stats=useMemo(()=>{
    const todayR=registros.filter(r=>new Date(r.fechaHora).toDateString()===today);
    const ingH=new Set(todayR.filter(r=>r.tipoOp==="INGRESO").map(r=>r.id)).size;
    const egH=new Set(todayR.filter(r=>r.tipoOp==="EGRESO").map(r=>r.id)).size;
    const genDentro=new Set(registros.filter(r=>r.modulo==="generador"&&r.tipoOp==="INGRESO").map(r=>r.id)).size;
    const total=new Set(registros.map(r=>r.id)).size;
    const abiertos=registros.filter(r=>r.tipoOp==="INGRESO").filter(r=>{
      const egIds=new Set(registros.filter(x=>x.tipoOp==="EGRESO"&&x.grupoId===r.grupoId).map(x=>x.grupoId));
      return!egIds.has(r.grupoId);
    });
    return{ingH,egH,genDentro,total,abiertos:new Set(abiertos.map(r=>r.grupoId)).size};
  },[registros,today]);
  const recent=useMemo(()=>{const seen=new Set();return[...registros].reverse().filter(r=>{if(seen.has(r.id))return false;seen.add(r.id);return true;}).slice(0,10);},[registros]);
  const SC=[
    {l:"Ingresos hoy",v:stats.ingH,bg:"var(--green-bg)",c:"var(--green-t)",bd:"var(--green-dark)"},
    {l:"Egresos hoy",v:stats.egH,bg:"var(--red-bg)",c:"var(--red-t)",bd:"var(--red-dark)"},
    {l:"Registros abiertos",v:stats.abiertos,bg:"var(--amber-bg)",c:"var(--amber-t)",bd:"var(--amber)"},
    {l:"Generadores activos",v:stats.genDentro,bg:"var(--blue-bg)",c:"var(--blue-t)",bd:"var(--accent)"},
  ];
  return(
    <div style={{maxWidth:"960px",margin:"0 auto"}}>
      <div className="g4" style={{...d.g4,marginBottom:"20px"}}>
        {SC.map(s=>(
          <div key={s.l} style={{background:s.bg,border:`1px solid ${s.bd}`,borderRadius:"var(--radius-lg)",padding:"1.1rem 1.2rem"}}>
            <div style={{fontSize:"32px",fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:"12px",color:s.c,opacity:.75,marginTop:"4px",fontWeight:500}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:"14px",marginBottom:"20px"}}>
        {[{icon:"➕",l:"Nueva Operación",desc:"Registrar ingreso o egreso",v:"nueva"},{icon:"⚡",l:"Grupo Electrógeno",desc:"Módulo generadores",v:"generadores"},{icon:"📋",l:"Historial",desc:"Consultar y exportar",v:"historial"}].map(item=>(
          <button key={item.v} onClick={()=>setView(item.v)} style={{...d.card,cursor:"pointer",textAlign:"left",border:"1px solid var(--border-light)",transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border-light)"}>
            <div style={{fontSize:"24px",marginBottom:"8px"}}>{item.icon}</div>
            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text)"}}>{item.l}</div>
            <div style={{fontSize:"12px",color:"var(--text-muted)",marginTop:"3px"}}>{item.desc}</div>
          </button>
        ))}
      </div>
      <div style={d.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
          <h3 style={{...d.h3,margin:0}}>Actividad reciente</h3>
          <span style={{fontSize:"11px",color:"var(--text-dim)"}}>{recent.length} operaciones</span>
        </div>
        {recent.length===0?(
          <div style={{textAlign:"center",padding:"40px 0",color:"var(--text-muted)"}}>Sin registros. Comenzá cargando la primera operación.</div>
        ):(
          recent.map((r,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:i<recent.length-1?"1px solid var(--border)":"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                <Badge tipo={r.tipoOp} small egresoTemprano={r.egresoTemprano}/>
                <div>
                  <div style={{fontSize:"13px",fontWeight:600,color:"var(--text)"}}>{r.nombre}</div>
                  <div style={{fontSize:"11px",color:"var(--text-muted)"}}>{r.perfil}{r.modulo==="generador"?" · ⚡ Generador":""}</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"monospace",fontSize:"12px",fontWeight:700,color:"var(--accent)"}}>{r.id}</div>
                <div style={{fontSize:"11px",color:"var(--text-muted)"}}>{fmtDate(r.fechaHora)}</div>
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   REMITO CARD
═══════════════════════════════════════════════════════ */
function RemitoCard({rem,idx,onUpd,onDel,estados,canDel}){

  return(
    <div style={{...d.card,marginBottom:"12px",borderLeft:"2px solid var(--accent)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
        <span style={{fontSize:"12px",fontWeight:600,color:"var(--text-muted)"}}>Remito #{idx+1}</span>
        {canDel&&<button onClick={onDel} style={d.btnDanger}>✕ Quitar</button>}
      </div>
      <div className="g2" style={{...d.g2,marginBottom:"10px"}}>
        <div><label style={d.label}>Nro Remito / OT</label><input style={d.input} value={rem.remito} onChange={e=>u("remito",e.target.value)} placeholder="Ej: 186757"/></div>
        <div><label style={d.label}>Estado del Material</label><select style={d.input} value={rem.estado} onChange={e=>u("estado",e.target.value)}>{estados.map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
      <div style={d.sec}><label style={d.label}>Detalle de Material</label><input style={d.input} value={rem.detalle} onChange={e=>u("detalle",e.target.value)} placeholder="Descripción del material"/></div>
      <div><label style={d.label}>Observaciones</label><input style={d.input} value={rem.obs} onChange={e=>u("obs",e.target.value)} placeholder="Observaciones (opcional)"/></div>

  );
}

/* ═══════════════════════════════════════════════════════
   NUEVA OPERACIÓN
═══════════════════════════════════════════════════════ */
function NuevaOp({registros,cfg,user,addRegistros,nextId,setView}){
  const[tipoOp,setTipoOp]=useState("INGRESO");
  const[perfil,setPerfil]=useState("Proveedor");
  const[nombre,setNombre]=useState("");
  const[remitos,setRemitos]=useState([{id:1,remito:"",detalle:"",estado:"Nuevo",obs:""}]);
  const[obsOtro,setObsOtro]=useState("");
  const[saving,setSaving]=useState(false);
  const[errors,setErrors]=useState({});
  // EGRESO TEMPRANO
  const[egresoTemprano,setEgresoTemprano]=useState(false);

  const perfiles=["Proveedor","Técnico","Oficina Técnica","Jefe","Otro"];
  const getNombres=()=>{if(perfil==="Proveedor")return cfg.proveedores;if(perfil==="Técnico")return cfg.tecnicos||[];if(perfil==="Oficina Técnica")return cfg.oficinaTecnica;if(perfil==="Jefe")return cfg.jefes;return[];};
  const addRem=()=>setRemitos(p=>[...p,{id:Date.now(),remito:"",detalle:"",estado:"Nuevo",obs:""}]);
  const updRem=(id,upd)=>setRemitos(p=>p.map(r=>r.id===id?{...r,...upd}:r));
  const delRem=(id)=>setRemitos(p=>p.filter(r=>r.id!==id));

  const validate=()=>{
    const e={};
    if(!nombre.trim())e.nombre="Ingresá el nombre o empresa";
    if(perfil!=="Otro")remitos.forEach((r,i)=>{if(!r.remito.trim())e[`r${i}`]="Nro de remito requerido";});
    setErrors(e);return!Object.keys(e).length;
  };

  const reset=()=>{setNombre("");setObsOtro("");setEgresoTemprano(false);setErrors({});setRemitos([{id:1,remito:"",detalle:"",estado:"Nuevo",obs:""}]);};

  const handleSubmit=async()=>{
    if(!validate())return;setSaving(true);
    const n=nextId();const inId=genId("INGRESO",n);const now=nowISO();
    const grupoId=`GRP-${n}`;
    const base={grupoId,fechaHora:now,perfil,nombre:nombre.trim(),modulo:"general",usuario:user.name};
    const lote=[];

    // Construir registros de INGRESO (o EGRESO directo si tipoOp===EGRESO)
    if(perfil==="Otro"||remitos.length===0){
      const id=genId(tipoOp,n);
      lote.push({...base,id,idOperacion:id,tipoOp,remito:"N/A",detalle:"N/A",estado:"N/A",obs:obsOtro||"Sin remitos"});
    }else{
      for(const r of remitos){
        const id=genId(tipoOp,n);
        lote.push({...base,id,idOperacion:id,tipoOp,remito:r.remito,detalle:r.detalle,estado:r.estado,obs:r.obs||obsOtro||"N/A"});
      }
    }

    // Si es INGRESO + egreso temprano, marcar la bandera en los registros del lote
    if(tipoOp==="INGRESO"&&egresoTemprano){
      lote.forEach(r=>r.egresoTemprano=true);
    }

    await addRegistros(lote);
    setSaving(false);reset();setView("dashboard");
  };

  return(
    <div style={{maxWidth:"700px",margin:"0 auto"}}>
      {/* Tipo Op */}
      <div style={{...d.card,marginBottom:"16px"}}>
        <label style={d.label}>Tipo de Operación</label>
        <div style={{display:"flex",gap:"8px",marginTop:"6px"}}>
          {["INGRESO","EGRESO"].map(t=>(
            <button key={t} onClick={()=>{setTipoOp(t);setEgresoTemprano(false);}} style={{flex:1,padding:"12px",borderRadius:"var(--radius)",border:`1px solid ${tipoOp===t?(t==="INGRESO"?"var(--green-dark)":"var(--red-dark)"):"var(--border)"}`,cursor:"pointer",fontWeight:700,fontSize:"15px",background:tipoOp===t?(t==="INGRESO"?"var(--green-bg)":"var(--red-bg)"):"transparent",color:tipoOp===t?(t==="INGRESO"?"var(--green-t)":"var(--red-t)"):"var(--text-muted)",transition:"all .15s"}}>
              {t==="INGRESO"?"▶ INGRESO":"◀ EGRESO"}
            </button>
          ))}
        </div>
        {/* Egreso Temprano toggle — solo en INGRESO */}
        {tipoOp==="INGRESO"&&(
          <div style={{marginTop:"14px",padding:"12px",background:"var(--amber-bg)",border:"1px solid var(--amber)",borderRadius:"var(--radius)"}}>
            <Toggle checked={egresoTemprano} onChange={setEgresoTemprano} label="Egreso temprano esperado" accent="var(--amber)"/>
            {egresoTemprano&&(
              <div style={{marginTop:"8px",fontSize:"12px",color:"var(--amber-t)"}}>
                ⚠️ Se registrará el ingreso con bandera de egreso temprano. Cuando la persona se retire, registrá el egreso normalmente.
              </div>
            )}
          </div>
        )}
      </div>

      {/* Perfil + Nombre */}
      <div style={{...d.card,marginBottom:"16px"}}>
        <div className="g2" style={d.g2}>
          <div>
            <label style={d.label}>Perfil</label>
            <select style={d.input} value={perfil} onChange={e=>{setPerfil(e.target.value);setNombre("");setErrors({});}}>
              {perfiles.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={d.label}>{perfil==="Proveedor"?"Empresa / Proveedor":"Nombre"}</label>
            {perfil==="Otro"
              ?<input style={{...d.input,borderColor:errors.nombre?"var(--red-dark)":undefined}} value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre completo"/>
              :<AutoInput options={getNombres()} value={nombre} onChange={setNombre} placeholder="Escribir para buscar..." error={errors.nombre}/>
            }
            {perfil==="Otro"&&errors.nombre&&<span style={d.err}>{errors.nombre}</span>}
          </div>
        </div>
      </div>

      {/* Remitos */}
      {perfil!=="Otro"?(
        <>
          {remitos.map((r,i)=>(
            <RemitoCard key={r.id} rem={r} idx={i} onUpd={u=>updRem(r.id,u)} onDel={()=>delRem(r.id)} estados={cfg.estadosMaterial} canDel={remitos.length>1}/>
          ))}
          {errors[`r0`]&&<span style={{...d.err,display:"block",marginBottom:"8px"}}>{errors["r0"]}</span>}
          <button onClick={addRem} style={{...d.btnGhost,width:"100%",marginBottom:"16px",padding:"10px",borderStyle:"dashed"}}>+ Agregar remito</button>
        </>
      ):(
        <div style={{...d.card,marginBottom:"16px"}}><label style={d.label}>Observaciones / Detalle</label><textarea style={{...d.input,height:"100px",resize:"vertical"}} value={obsOtro} onChange={e=>setObsOtro(e.target.value)} placeholder="Detallá el motivo..."/></div>
      )}

      <button onClick={handleSubmit} disabled={saving} style={{...d.btnPrimary,width:"100%",padding:"14px",fontSize:"15px",opacity:saving?.6:1}}>
        {saving?"Guardando...":"💾 Guardar Registro"}
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   GENERADORES
═══════════════════════════════════════════════════════ */
function Generadores({registros,cfg,user,addRegistros,nextId,setView}){
  const[tipoOp,setTipoOp]=useState("INGRESO");
  const[proveedor,setProveedor]=useState("");
  const[tecnico,setTecnico]=useState("");
  const[modelo,setModelo]=useState("");
  const[motivo,setMotivo]=useState(DEF_CFG.motivosGenerador[0]);
  const[obs,setObs]=useState("");
  const[saving,setSaving]=useState(false);
  const[errors,setErrors]=useState({});
  const[egresoTemprano,setEgresoTemprano]=useState(false);

  const genList=useMemo(()=>{const seen=new Set();return[...registros].filter(r=>r.modulo==="generador").filter(r=>{if(!seen.has(r.id)){seen.add(r.id);return true;}return false;});},[registros]);
  
  const validate=()=>{const e={};if(!proveedor.trim())e.proveedor="Requerido";if(!modelo.trim())e.modelo="Requerido";setErrors(e);return!Object.keys(e).length;};
  
  const handleSubmit=async()=>{
    if(!validate())return;setSaving(true);
    const n=nextId();const id=genId(tipoOp,n);const grupoId=`GRP-${n}`;
    const base={id,idOperacion:id,grupoId,fechaHora:nowISO(),perfil:"Grupo Electrógeno",nombre:proveedor.trim(),remito:modelo.trim(),detalle:motivo,estado:tipoOp==="INGRESO"?"Dentro":"Retirado",obs:`Técnico: ${tecnico||"N/A"} | ${obs}`,tipoOp,modulo:"generador",proveedor:proveedor.trim(),tecnico,modelo:modelo.trim(),motivo,usuario:user.name};
    if(tipoOp==="INGRESO"&&egresoTemprano) base.egresoTemprano=true;
    await addRegistros([base]);setSaving(false);setProveedor("");setTecnico("");setModelo("");setObs("");setEgresoTemprano(false);setErrors({});setView("dashboard");
  };

  return(
    <div style={{maxWidth:"700px",margin:"0 auto"}}>
      <div style={{background:"var(--amber-bg)",border:"1px solid var(--amber)",borderRadius:"var(--radius-lg)",padding:"13px 18px",marginBottom:"18px",display:"flex",alignItems:"center",gap:"13px"}}>
        <span style={{fontSize:"26px"}}>⚡</span>
        <div><div style={{fontSize:"14px",fontWeight:700,color:"var(--amber-t)"}}>Módulo: Grupos Electrógenos</div><div style={{fontSize:"12px",color:"var(--amber)",opacity:.8}}>{genList.length} generador(es) registrado(s) en el sistema</div></div>
      </div>

      <div style={{...d.card,marginBottom:"16px"}}>
        <label style={d.label}>Tipo de Operación</label>
        <div style={{display:"flex",gap:"8px",marginTop:"6px"}}>
          {["INGRESO","EGRESO"].map(t=>(
            <button key={t} onClick={()=>{setTipoOp(t);setEgresoTemprano(false);}} style={{flex:1,padding:"12px",borderRadius:"var(--radius)",border:`1px solid ${tipoOp===t?(t==="INGRESO"?"var(--green-dark)":"var(--red-dark)"):"var(--border)"}`,cursor:"pointer",fontWeight:700,fontSize:"15px",background:tipoOp===t?(t==="INGRESO"?"var(--green-bg)":"var(--red-bg)"):"transparent",color:tipoOp===t?(t==="INGRESO"?"var(--green-t)":"var(--red-t)"):"var(--text-muted)"}}>
              {t==="INGRESO"?"▶ INGRESO":"◀ EGRESO"}
            </button>
          ))}
        </div>
        {tipoOp==="INGRESO"&&(
          <div style={{marginTop:"14px",padding:"12px",background:"var(--amber-bg)",border:"1px solid var(--amber)",borderRadius:"var(--radius)"}}>
            <Toggle checked={egresoTemprano} onChange={setEgresoTemprano} label="Egreso temprano esperado" accent="var(--amber)"/>
            {egresoTemprano&&(
              <div style={{marginTop:"8px",fontSize:"12px",color:"var(--amber-t)"}}>
                ⚠️ Se registrará el ingreso con bandera de egreso temprano. Cuando el equipo se retire, registrá el egreso normalmente.
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{...d.card,marginBottom:"16px"}}>
        <div className="g2" style={{...d.g2,marginBottom:"12px"}}>
          <div><label style={d.label}>Empresa / Proveedor</label><AutoInput options={cfg.proveedores} value={proveedor} onChange={setProveedor} placeholder="Buscar proveedor..." error={errors.proveedor}/></div>
          <div><label style={d.label}>Técnico Responsable</label><AutoInput options={cfg.tecnicos||[]} value={tecnico} onChange={setTecnico} placeholder="Buscar técnico..."/></div>
        </div>
        <div className="g2" style={{...d.g2,marginBottom:"12px"}}>
          <div><label style={d.label}>Equipo / Grupo Electrógeno</label><select style={{...d.input,borderColor:errors.modelo?"var(--red-dark)":undefined}} value={modelo} onChange={e=>setModelo(e.target.value)}><option value="">— Seleccionar equipo —</option>{(cfg.generadores||DEF_CFG.generadores).map(g=><option key={g}>{g}</option>)}</select>{errors.modelo&&<span style={d.err}>{errors.modelo}</span>}</div>
          <div><label style={d.label}>Motivo</label><select style={d.input} value={motivo} onChange={e=>setMotivo(e.target.value)}>{cfg.motivosGenerador.map(m=><option key={m}>{m}</option>)}</select></div>
        </div>
        <div><label style={d.label}>Observaciones generales</label><textarea style={{...d.input,height:"72px",resize:"vertical"}} value={obs} onChange={e=>setObs(e.target.value)} placeholder="Observaciones adicionales..."/></div>
      </div>

      <button onClick={handleSubmit} disabled={saving} style={{...d.btnPrimary,width:"100%",padding:"14px",fontSize:"15px",opacity:saving?.6:1,marginBottom:"22px"}}>
        {saving?"Guardando...":"⚡ Registrar Grupo Electrógeno"}
      </button>

      {genList.length>0&&(
        <div style={d.card}>
          <h3 style={d.h3}>Generadores registrados</h3>
          {genList.map((g,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<genList.length-1?"1px solid var(--border)":"none"}}>
              <div><div style={{fontSize:"13px",fontWeight:600,color:"var(--text)"}}>{g.modelo||g.remito}</div><div style={{fontSize:"11px",color:"var(--text-muted)"}}>{g.nombre} · {g.motivo||g.detalle}</div></div>
              <Badge tipo={g.tipoOp} small egresoTemprano={g.egresoTemprano}/>
            </div>
          ))}
        </div>
      )}

      <GeEgresosTemprano registros={registros} addRegistros={addRegistros} nextId={nextId} user={user}/>
    </div>
  );
}

function GeEgresosTemprano({registros,addRegistros,nextId,user}){
  const ingTempranos=useMemo(()=>
    registros.filter(r=>r.tipoOp==="INGRESO"&&r.egresoTemprano&&r.modulo==="generador")
  ,[registros]);

  const gruposConEgreso=useMemo(()=>
    new Set(registros.filter(r=>r.tipoOp==="EGRESO"&&r.grupoId).map(r=>r.grupoId))
  ,[registros]);

  const unicos=(lista)=>{const seen=new Set();return lista.filter(r=>{if(seen.has(r.grupoId))return false;seen.add(r.grupoId);return true;});};

  const abiertos=useMemo(()=>unicos(ingTempranos.filter(r=>!gruposConEgreso.has(r.grupoId))).sort((a,b)=>new Date(a.fechaHora)-new Date(b.fechaHora)),[ingTempranos,gruposConEgreso]);
  const cerrados=useMemo(()=>unicos(ingTempranos.filter(r=>gruposConEgreso.has(r.grupoId))).sort((a,b)=>new Date(b.fechaHora)-new Date(a.fechaHora)),[ingTempranos,gruposConEgreso]);

  const egresoDelGrupo=(grupoId)=>registros.find(r=>r.tipoOp==="EGRESO"&&r.grupoId===grupoId);

        {abiertos.length>0&&(

            <div style={{...rowStyle,paddingTop:0,borderBottom:"2px solid var(--border)"}}><div style={lbl}>Equipo / Proveedor</div><div style={lbl}>Técnico</div><div style={lbl}>Tiempo</div><div style={lbl}>Acción</div></div>

                <div style={{fontSize:"12px",color:"var(--text-muted)"}}>{fmtDate(r.fechaHora)}</div>

            {cerrados.map(r=>{

  );

/* ═══════════════════════════════════════════════════════
   HISTORIAL
═══════════════════════════════════════════════════════ */
function Historial({registros}){
  const[search,setSearch]=useState("");const[fTipo,setFTipo]=useState("TODOS");const[fPerfil,setFPerfil]=useState("TODOS");const[fFecha,setFFecha]=useState("");const[fModulo,setFModulo]=useState("TODOS");
  const perfiles=useMemo(()=>["TODOS",...new Set(registros.map(r=>r.perfil))],[registros]);
  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return[...registros].reverse().filter(r=>{
      if(fTipo!=="TODOS"&&r.tipoOp!==fTipo)return false;
      if(fPerfil!=="TODOS"&&r.perfil!==fPerfil)return false;
      if(fModulo!=="TODOS"&&(r.modulo||"general")!==fModulo)return false;
      if(fFecha&&!r.fechaHora?.startsWith(fFecha))return false;
      if(q&&![r.nombre,r.remito,r.id,r.detalle,r.estado,r.usuario].some(v=>v?.toLowerCase().includes(q)))return false;
      return true;
    });
  },[registros,search,fTipo,fPerfil,fFecha,fModulo]);

  const exportCSV=()=>{
    const H=["ID","Fecha","Tipo Op","Perfil","Módulo","Nombre/Empresa","Remito/OT","Detalle","Estado","Observaciones","Egreso Temprano","Usuario"];
    const rows=filtered.map(r=>[r.id,fmtDate(r.fechaHora),r.tipoOp,r.perfil,r.modulo||"general",r.nombre,r.remito,r.detalle,r.estado,r.obs,r.egresoTemprano?"Sí":"No",r.usuario]);
    const csv=[H,...rows].map(row=>row.map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));a.download=`porteria_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };

  const th={padding:"9px 11px",fontSize:"11px",fontWeight:700,color:"var(--text-muted)",textAlign:"left",textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid var(--border-light)",whiteSpace:"nowrap",background:"#0e1020"};
  const td={padding:"9px 11px",fontSize:"12px",color:"var(--text)",borderBottom:"1px solid var(--border)"};

  return(
    <div>
      <div className="filter-row" style={{...d.card,marginBottom:"16px",display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:"12px"}}>
        <div><label style={d.label}>Búsqueda</label><input style={d.input} value={search} onChange={e=>setSearch(e.target.value)} placeholder="ID, nombre, remito..."/></div>
        <div><label style={d.label}>Operación</label><select style={d.input} value={fTipo} onChange={e=>setFTipo(e.target.value)}><option value="TODOS">Todos</option><option value="INGRESO">Ingreso</option><option value="EGRESO">Egreso</option></select></div>
        <div><label style={d.label}>Módulo</label><select style={d.input} value={fModulo} onChange={e=>setFModulo(e.target.value)}><option value="TODOS">Todos</option><option value="general">General</option><option value="generador">Generadores</option></select></div>
        <div><label style={d.label}>Perfil</label><select style={d.input} value={fPerfil} onChange={e=>setFPerfil(e.target.value)}>{perfiles.map(p=><option key={p}>{p}</option>)}</select></div>
        <div><label style={d.label}>Fecha</label><input type="date" style={d.input} value={fFecha} onChange={e=>setFFecha(e.target.value)}/></div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
        <span style={d.muted}>{filtered.length} registro(s)</span>
        <button onClick={exportCSV} style={d.btnGhost}>📥 Exportar CSV/Excel</button>
      </div>
      <div style={{...d.card,overflowX:"auto",padding:0,borderRadius:"var(--radius-lg)"}}>
        {filtered.length===0?(
          <div style={{textAlign:"center",padding:"52px",color:"var(--text-muted)"}}>No hay registros con los filtros aplicados</div>
        ):(
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["ID","Fecha","Op","Perfil","Nombre / Empresa","Remito / OT","Detalle","Estado","ET","Usuario"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
            <tbody>
              {filtered.map((r,i)=>(
                <tr key={i} onMouseEnter={e=>e.currentTarget.style.background="var(--bg-hover)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"} style={{transition:"background .1s"}}>
                  <td style={{...td,fontFamily:"monospace",color:"var(--accent)",fontWeight:700,whiteSpace:"nowrap"}}>{r.id}</td>
                  <td style={{...td,whiteSpace:"nowrap",fontSize:"11px",color:"var(--text-muted)"}}>{fmtDate(r.fechaHora)}</td>
                  <td style={td}><Badge tipo={r.tipoOp} small/></td>
                  <td style={{...td,fontSize:"11px"}}>{r.perfil}</td>
                  <td style={{...td,maxWidth:"160px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.nombre}</td>
                  <td style={{...td,fontFamily:"monospace",fontSize:"11px",color:"var(--text-muted)"}}>{r.remito}</td>
                  <td style={{...td,maxWidth:"140px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:"11px"}}>{r.detalle}</td>
                  <td style={{...td,fontSize:"11px"}}>{r.estado}</td>
                  <td style={td}>{r.egresoTemprano?<span style={{fontSize:"9px",background:"var(--amber-bg)",color:"var(--amber-t)",padding:"2px 5px",borderRadius:"4px",fontWeight:700}}>ET</span>:"—"}</td>
                  <td style={{...td,color:"var(--text-muted)",fontSize:"11px"}}>{r.usuario}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   LIST EDITOR (Admin)
═══════════════════════════════════════════════════════ */
function ListEditor({title,items,onSave}){
  const[list,setList]=useState([...items].sort());const[nItem,setNItem]=useState("");const[editing,setEditing]=useState(null);const[editVal,setEditVal]=useState("");
  const add=()=>{const v=nItem.trim();if(!v||list.includes(v))return;setList(p=>[...p,v].sort());setNItem("");};
  const del=(i)=>setList(p=>p.filter((_,idx)=>idx!==i));
  const saveEd=()=>{if(editVal.trim())setList(p=>p.map((it,i)=>i===editing?editVal.trim():it).sort());setEditing(null);};
  return(
    <div style={{...d.card,marginBottom:"14px"}}>
      <h3 style={d.h3}>{title} <span style={{fontSize:"11px",fontWeight:400,color:"var(--text-muted)"}}>({list.length})</span></h3>
      <div style={{maxHeight:"260px",overflowY:"auto",marginBottom:"12px"}}>
        {list.length===0&&<p style={{...d.muted,fontSize:"12px",textAlign:"center",padding:"16px 0"}}>Sin elementos. Agregá uno.</p>}
        {list.map((item,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
            {editing===i
              ?<><input style={{...d.input,flex:1,padding:"6px 10px"}} value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEd();if(e.key==="Escape")setEditing(null);}} autoFocus/><button onClick={saveEd} style={{...d.btnPrimary,padding:"5px 12px",fontSize:"12px"}}>OK</button><button onClick={()=>setEditing(null)} style={{...d.btnGhost,padding:"5px 10px",fontSize:"12px"}}>✕</button></>
              :<><span style={{flex:1,fontSize:"13px",color:"var(--text)"}}>{item}</span><button onClick={()=>{setEditing(i);setEditVal(list[i]);}} style={{...d.btnGhost,padding:"4px 9px",fontSize:"11px"}}>✏️</button><button onClick={()=>del(i)} style={{...d.btnDanger,padding:"4px 9px",fontSize:"11px"}}>✕</button></>
            }
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
        <input style={{...d.input,flex:1}} value={nItem} onChange={e=>setNItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Nuevo elemento (Enter para agregar)..."/>
        <button onClick={add} style={d.btnPrimary}>+ Agregar</button>
      </div>
      <button onClick={()=>onSave(list)} style={{...d.btnPrimary,width:"100%"}}>💾 Guardar cambios</button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   EGRESOS TEMPRANOS
═══════════════════════════════════════════════════════ */
function EgresosTemprano({registros,addRegistros,nextId,user}){

  // INGRESOs marcados como egreso temprano
  const ingTempranos=useMemo(()=>
    registros.filter(r=>r.tipoOp==="INGRESO"&&r.egresoTemprano)
  ,[registros]);

  // grupoIds que ya tienen un EGRESO registrado
  const gruposConEgreso=useMemo(()=>
    new Set(registros.filter(r=>r.tipoOp==="EGRESO"&&r.grupoId).map(r=>r.grupoId))
  ,[registros]);

  // Para cada grupoId de egreso temprano, tomamos el primer INGRESO (evitamos duplicados de remitos)
  const unicos=(lista)=>{
    const seen=new Set();
    return lista.filter(r=>{if(seen.has(r.grupoId))return false;seen.add(r.grupoId);return true;});
  };

  const abiertos=useMemo(()=>
    unicos(ingTempranos.filter(r=>!gruposConEgreso.has(r.grupoId)))
      .sort((a,b)=>new Date(a.fechaHora)-new Date(b.fechaHora))
  ,[ingTempranos,gruposConEgreso]);

  const cerrados=useMemo(()=>
    unicos(ingTempranos.filter(r=>gruposConEgreso.has(r.grupoId)))
      .sort((a,b)=>new Date(b.fechaHora)-new Date(a.fechaHora))
  ,[ingTempranos,gruposConEgreso]);

  const cerrarEgreso=async(ing)=>{
    const n=nextId();
    const egId=genId("EGRESO",n);
    const egreso={
      id:egId,idOperacion:egId,grupoId:ing.grupoId,
      fechaHora:nowISO(),tipoOp:"EGRESO",
      perfil:ing.perfil,nombre:ing.nombre,
      remito:ing.remito,detalle:ing.detalle,estado:ing.estado,
      obs:"Egreso temprano cerrado",modulo:ing.modulo||"general",
      egresoTemprano:true,usuario:user.name,
    };
    await addRegistros([egreso]);
  };

  const tiempoDesde=(fechaHora)=>{
    const diff=Math.round((new Date()-new Date(fechaHora))/60000);
    if(diff<60) return`${diff} min`;
    return`${Math.floor(diff/60)}h ${diff%60}min`;
  };

  const egresoDelGrupo=(grupoId)=>
    registros.find(r=>r.tipoOp==="EGRESO"&&r.grupoId===grupoId);

  const rowStyle={display:"grid",gridTemplateColumns:"2fr 1.5fr 110px 150px",gap:"12px",alignItems:"center",padding:"12px 0",borderBottom:"1px solid var(--border)"};
  const labelMuted={fontSize:"10px",color:"var(--text-muted)",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em"};

  return(
    <div style={{maxWidth:"900px",margin:"0 auto"}}>

      {/* Header */}
      <div style={{marginBottom:"22px"}}>
        <div style={{fontSize:"20px",fontWeight:800,color:"var(--amber-t)"}}>⏱️ Egresos Tempranos</div>
        <div style={{fontSize:"12px",color:"var(--text-muted)",marginTop:"2px"}}>
          Ingresos con egreso temprano esperado — {abiertos.length} abierto(s) · {cerrados.length} cerrado(s)
        </div>
      </div>

      {/* ABIERTOS */}
      <div style={{...d.card,marginBottom:"18px",border:"1px solid var(--amber)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"var(--amber)",boxShadow:"0 0 6px var(--amber)"}}/>
          <h3 style={{...d.h3,margin:0,color:"var(--amber-t)"}}>EGRESOS TEMPRANOS ABIERTOS</h3>
          <span style={{marginLeft:"auto",fontSize:"12px",background:"var(--amber-bg)",color:"var(--amber-t)",padding:"2px 10px",borderRadius:"12px",fontWeight:700}}>{abiertos.length}</span>
        </div>

        {abiertos.length===0&&(
          <p style={{...d.muted,textAlign:"center",padding:"16px 0"}}>No hay egresos tempranos pendientes.</p>
        )}

        {abiertos.length>0&&(
          <>
            <div style={{...rowStyle,paddingTop:0,borderBottom:"2px solid var(--border)"}}>
              <div style={labelMuted}>Nombre / Empresa</div>
              <div style={labelMuted}>Perfil · Módulo</div>
              <div style={labelMuted}>Ingresó hace</div>
              <div style={labelMuted}>Acción</div>
            </div>
            {abiertos.map(r=>(
              <div key={r.grupoId} style={rowStyle}>
                <div>
                  <div style={{fontSize:"14px",fontWeight:600,color:"var(--text)"}}>{r.nombre}</div>
                  <div style={{fontSize:"11px",color:"var(--text-muted)",marginTop:"2px"}}>{fmtDate(r.fechaHora)}</div>
                </div>
                <div>
                  <div style={{fontSize:"13px",color:"var(--text)"}}>{r.perfil}</div>
                  <div style={{fontSize:"11px",color:"var(--text-muted)",textTransform:"capitalize"}}>{r.modulo||"general"}</div>
                </div>
                <div style={{fontSize:"15px",fontWeight:700,color:"var(--amber-t)"}}>{tiempoDesde(r.fechaHora)}</div>
                <button
                  onClick={()=>cerrarEgreso(r)}
                  style={{padding:"8px 16px",borderRadius:"var(--radius)",border:"1px solid var(--amber)",background:"var(--amber-bg)",color:"var(--amber-t)",fontWeight:700,fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"}}>
                  ✓ Cerrar Egreso
                </button>
              </div>
            ))}
          </>
        )}
      </div>

      {/* CERRADOS */}
      <div style={d.card}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"16px"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"var(--green)"}}/>
          <h3 style={{...d.h3,margin:0,color:"var(--green-t)"}}>EGRESOS TEMPRANOS CERRADOS</h3>
          <span style={{marginLeft:"auto",fontSize:"12px",background:"var(--green-bg)",color:"var(--green-t)",padding:"2px 10px",borderRadius:"12px",fontWeight:700}}>{cerrados.length}</span>
        </div>

        {cerrados.length===0&&(
          <p style={{...d.muted,textAlign:"center",padding:"16px 0"}}>Aún no hay egresos tempranos cerrados.</p>
        )}

        {cerrados.length>0&&(
          <>
            <div style={{...rowStyle,paddingTop:0,borderBottom:"2px solid var(--border)"}}>
              <div style={labelMuted}>Nombre / Empresa</div>
              <div style={labelMuted}>Perfil · Módulo</div>
              <div style={labelMuted}>Ingreso</div>
              <div style={labelMuted}>Egreso</div>
            </div>
            {cerrados.map(r=>{
              const eg=egresoDelGrupo(r.grupoId);
              const dur=eg?Math.round((new Date(eg.fechaHora)-new Date(r.fechaHora))/60000):null;
              const durStr=dur===null?"—":dur<60?`${dur}m`:`${Math.floor(dur/60)}h ${dur%60}m`;
              return(
                <div key={r.grupoId} style={rowStyle}>
                  <div>
                    <div style={{fontSize:"14px",fontWeight:600,color:"var(--text)"}}>{r.nombre}</div>
                    <div style={{fontSize:"11px",color:"var(--text-muted)",marginTop:"2px"}}>{r.perfil}</div>
                  </div>
                  <div style={{fontSize:"13px",color:"var(--text-muted)",textTransform:"capitalize"}}>{r.modulo||"general"}</div>
                  <div style={{fontSize:"12px",color:"var(--text-muted)"}}>{fmtDate(r.fechaHora)}</div>
                  <div>
                    <div style={{fontSize:"12px",color:"var(--green-t)",fontWeight:600}}>{eg?fmtDate(eg.fechaHora):"—"}</div>
                    <div style={{fontSize:"11px",color:"var(--text-muted)"}}>Duración: {durStr}</div>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </div>
  );
}

  const[rango,setRango]=useState("30");

    const corte=new Date(ahora);
    corte.setDate(corte.getDate()-dias);

  const ayer=useMemo(()=>{
    const d=new Date(hoy);d.setDate(d.getDate()-1);return d;
  },[hoy]);

  const mesInicio=useMemo(()=>{
    return new Date(ahora.getFullYear(),ahora.getMonth(),1);
  },[ahora]);

  // ── KPI: personas dentro ahora ──
  const dentroAhora=useMemo(()=>{
    const hoyStr=hoy.toDateString();
    const ingresos=registros.filter(r=>r.tipoOp==="INGRESO"&&new Date(r.fechaHora).toDateString()===hoyStr);
    const gruposConEgreso=new Set(registros.filter(r=>r.tipoOp==="EGRESO"&&r.grupoId).map(r=>r.grupoId));
    return ingresos.filter(r=>r.grupoId&&!gruposConEgreso.has(r.grupoId)).length;
  },[registros,hoy]);

  // ── KPI: movimientos hoy vs ayer ──
  const {movHoy,movAyer,pctDiff}=useMemo(()=>{
    const mh=registros.filter(r=>new Date(r.fechaHora)>=hoy).length;
    const ma=registros.filter(r=>{const f=new Date(r.fechaHora);return f>=ayer&&f<hoy;}).length;
    const pct=ma===0?100:Math.round(((mh-ma)/ma)*100);
    return{movHoy:mh,movAyer:ma,pctDiff:pct};
  },[registros,hoy,ayer]);

  // ── KPI: tasa egreso temprano del mes ──
  const tasaEgresoTemprano=useMemo(()=>{
    const del_mes=registros.filter(r=>new Date(r.fechaHora)>=mesInicio);
    if(!del_mes.length) return 0;
    const temp=del_mes.filter(r=>r.egresoTemprano).length;
    return Math.round((temp/del_mes.length)*100);
  },[registros,mesInicio]);

  // ── KPI: tiempo promedio de permanencia hoy (minutos) ──
  const tiempoPromedio=useMemo(()=>{
    const hoyStr=hoy.toDateString();
    const ingresos=registros.filter(r=>r.tipoOp==="INGRESO"&&r.grupoId&&new Date(r.fechaHora).toDateString()===hoyStr);
    const tiempos=[];
    ingresos.forEach(ing=>{
      const eg=registros.find(r=>r.tipoOp==="EGRESO"&&r.grupoId===ing.grupoId);
      if(eg){
        const diff=(new Date(eg.fechaHora)-new Date(ing.fechaHora))/60000;
        if(diff>0&&diff<1440) tiempos.push(diff);
      }
    });
    if(!tiempos.length) return null;
    return Math.round(tiempos.reduce((a,b)=>a+b,0)/tiempos.length);
  },[registros,hoy]);

  // ── Heatmap: [dia0-6][hora0-23] = count ──
  const heatmapData=useMemo(()=>{
    const mat=Array.from({length:7},()=>Array(24).fill(0));
    filtrados.forEach(r=>{
      const d=new Date(r.fechaHora);
      const dia=(d.getDay()+6)%7; // 0=Lun
      const hora=d.getHours();
      mat[dia][hora]++;
    });
    return mat;
  },[filtrados]);

  const heatmapMax=useMemo(()=>Math.max(1,...heatmapData.flat()),[heatmapData]);

  // ── Top 10 nombres/proveedores del mes ──
  const top10=useMemo(()=>{
    const del_mes=registros.filter(r=>new Date(r.fechaHora)>=mesInicio&&r.nombre);
    const cnt={};
    del_mes.forEach(r=>{cnt[r.nombre]=(cnt[r.nombre]||0)+1;});
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,10);
  },[registros,mesInicio]);

  const top10max=top10.length?top10[0][1]:1;

  // ── Línea de tiempo hoy (ingresos vs egresos por hora) ──
  const lineaHoy=useMemo(()=>{
    const hoyStr=hoy.toDateString();
    const horas=Array.from({length:24},(_,i)=>({h:i,ing:0,eg:0}));
    registros.filter(r=>new Date(r.fechaHora).toDateString()===hoyStr).forEach(r=>{
      const h=new Date(r.fechaHora).getHours();
      if(r.tipoOp==="INGRESO") horas[h].ing++;
      else horas[h].eg++;
    });
    return horas;
  },[registros,hoy]);

  const lineaMax=useMemo(()=>Math.max(1,...lineaHoy.map(h=>Math.max(h.ing,h.eg))),[lineaHoy]);

  // ── Torta: distribución por perfil del mes ──
  const perfilData=useMemo(()=>{
    const del_mes=registros.filter(r=>new Date(r.fechaHora)>=mesInicio&&r.perfil);
    const cnt={};
    del_mes.forEach(r=>{cnt[r.perfil]=(cnt[r.perfil]||0)+1;});
    const total=Object.values(cnt).reduce((a,b)=>a+b,0)||1;
    const colores={"Proveedor":"var(--accent)","Oficina Técnica":"var(--purple)","Jefe":"var(--green)","Otro":"var(--amber)"};
    let acum=0;
    return Object.entries(cnt).map(([perfil,n])=>{
      const pct=(n/total)*100;
      const ini=acum;acum+=pct;
      return{perfil,n,pct:Math.round(pct),ini,color:colores[perfil]||"var(--text-muted)"};
    });
  },[registros,mesInicio]);

  // ── Barras por módulo ──
  const moduloData=useMemo(()=>{
    const cnt={general:0,generador:0,material:0};
    filtrados.forEach(r=>{if(cnt[r.modulo]!==undefined)cnt[r.modulo]++;});
    const mx=Math.max(1,...Object.values(cnt));
    return[
      {k:"general",label:"General",cnt:cnt.general,pct:Math.round((cnt.general/mx)*100),color:"var(--accent)"},
      {k:"generador",label:"Generadores",cnt:cnt.generador,pct:Math.round((cnt.generador/mx)*100),color:"var(--amber)"},
      {k:"material",label:"Material",cnt:cnt.material,pct:Math.round((cnt.material/mx)*100),color:"var(--purple)"},
    ];
  },[filtrados]);

  // ── Anomalías: ingresos sin egreso >4h ──
  const sinEgreso=useMemo(()=>{
    const ahMs=ahora.getTime();
    const ingresos=registros.filter(r=>r.tipoOp==="INGRESO"&&r.grupoId);
    const gruposConEgreso=new Set(registros.filter(r=>r.tipoOp==="EGRESO"&&r.grupoId).map(r=>r.grupoId));
    return ingresos
      .filter(r=>!gruposConEgreso.has(r.grupoId)&&(ahMs-new Date(r.fechaHora).getTime())>4*60*60*1000)
      .sort((a,b)=>new Date(a.fechaHora)-new Date(b.fechaHora));
  },[registros,ahora]);

  // ── Anomalías: egresos tempranos últimos 7 días por perfil ──
  const egresosTempPerfil=useMemo(()=>{
    const corte=new Date(ahora);corte.setDate(corte.getDate()-7);
    const temp=registros.filter(r=>r.egresoTemprano&&new Date(r.fechaHora)>=corte);
    const cnt={};
    temp.forEach(r=>{const p=r.perfil||"Sin perfil";cnt[p]=(cnt[p]||0)+1;});
    return Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  },[registros,ahora]);

  const dias7=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

  const fmtMin=(m)=>{if(m===null)return"—";if(m<60)return`${m} min`;return`${Math.floor(m/60)}h ${m%60}min`;};

  const conicStops=useMemo(()=>{
    let s="",acum=0;
    perfilData.forEach(p=>{
      s+=`${p.color} ${acum}% ${acum+p.pct}%,`;
      acum+=p.pct;
    });
    return s.slice(0,-1)||"var(--border) 0% 100%";
  },[perfilData]);

  const rangoOpts=[{v:"1",l:"Hoy"},{v:"7",l:"7 días"},{v:"30",l:"30 días"},{v:"todo",l:"Todo"}];

  const kpiCard=(icon,title,value,sub,color="var(--accent)")=>(
    <div style={{...d.card,display:"flex",flexDirection:"column",gap:"6px"}}>
      <div style={{fontSize:"11px",fontWeight:600,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:".07em"}}>{icon} {title}</div>
      <div style={{fontSize:"28px",fontWeight:800,color,lineHeight:1}}>{value}</div>
      {sub&&<div style={{fontSize:"11px",color:"var(--text-muted)"}}>{sub}</div>}
    </div>
  );

  return(
    <div style={{maxWidth:"1100px",margin:"0 auto"}}>

      {/* Header + selector de rango */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"20px",flexWrap:"wrap",gap:"10px"}}>
        <div>
          <div style={{fontSize:"20px",fontWeight:800,color:"var(--text)"}}>📊 Analytics</div>
          <div style={{fontSize:"12px",color:"var(--text-muted)",marginTop:"2px"}}>Métricas en tiempo real del sistema de acceso</div>
        </div>
        <div style={{display:"flex",gap:"6px"}}>
          {rangoOpts.map(o=>(
            <button key={o.v} onClick={()=>setRango(o.v)} style={{padding:"6px 14px",borderRadius:"var(--radius)",border:"1px solid",borderColor:rango===o.v?"var(--accent)":"var(--border-light)",background:rango===o.v?"color-mix(in srgb, var(--accent) 15%, transparent)":"transparent",color:rango===o.v?"var(--accent)":"var(--text-muted)",fontSize:"12px",fontWeight:rango===o.v?700:400,cursor:"pointer"}}>
              {o.l}
            </button>
          ))}
        </div>
      </div>

      {/* Fila 1 — KPI Cards */}
      <div className="g4" style={{...d.g4,marginBottom:"18px"}}>
        {kpiCard("👥","Dentro ahora",dentroAhora,"Ingresos sin egreso hoy","var(--green-t)")}
        {kpiCard("🔄","Movimientos hoy",movHoy,
          <span style={{color:pctDiff>=0?"var(--green-t)":"var(--red-t)"}}>
            {pctDiff>=0?"↑":"↓"} {Math.abs(pctDiff)}% vs ayer ({movAyer})
          </span>,
          "var(--blue-t)"
        )}
        {kpiCard("⏰","Egreso temprano",`${tasaEgresoTemprano}%`,"Del mes actual","var(--amber-t)")}
        {kpiCard("⌛","Permanencia prom.",fmtMin(tiempoPromedio),"Promedio hoy (min)","var(--purple-t)")}
      </div>

      {/* Fila 2 — Heatmap + Top 10 */}
      <div className="g2" style={{...d.g2,marginBottom:"18px"}}>

        {/* Heatmap */}
        <div style={{...d.card,overflowX:"auto"}}>
          <h3 style={d.h3}>🔥 Heatmap de Tráfico</h3>
          <div style={{display:"flex",gap:"4px",marginBottom:"6px"}}>
            <div style={{width:"28px",flexShrink:0}}/>
            {Array.from({length:24},(_,h)=>(
              <div key={h} style={{flex:1,fontSize:"9px",color:"var(--text-muted)",textAlign:"center",minWidth:"14px"}}>{h%4===0?h:""}</div>
            ))}
          </div>
          {heatmapData.map((row,di)=>(
            <div key={di} style={{display:"flex",gap:"4px",marginBottom:"3px",alignItems:"center"}}>
              <div style={{width:"28px",fontSize:"10px",color:"var(--text-muted)",flexShrink:0,textAlign:"right",paddingRight:"4px"}}>{dias7[di]}</div>
              {row.map((cnt,hi)=>{
                const pct=cnt/heatmapMax;
                const bg=pct===0?"var(--bg-input)":`color-mix(in srgb, var(--accent) ${Math.round(pct*85+5)}%, var(--bg-input))`;
                return(
                  <div key={hi} title={`${dias7[di]} ${hi}h: ${cnt} mov`} style={{flex:1,aspectRatio:"1",borderRadius:"3px",background:bg,minWidth:"14px",minHeight:"14px",cursor:"default"}}/>
                );
              })}
            </div>
          ))}
          <div style={{display:"flex",alignItems:"center",gap:"6px",marginTop:"10px",justifyContent:"flex-end"}}>
            <div style={{fontSize:"10px",color:"var(--text-muted)"}}>Menos</div>
            {[0,.25,.5,.75,1].map(p=>(
              <div key={p} style={{width:"14px",height:"14px",borderRadius:"3px",background:p===0?"var(--bg-input)":`color-mix(in srgb, var(--accent) ${Math.round(p*85+5)}%, var(--bg-input))`}}/>
            ))}
            <div style={{fontSize:"10px",color:"var(--text-muted)"}}>Más</div>
          </div>
        </div>

        {/* Top 10 */}
        <div style={d.card}>
          <h3 style={d.h3}>🏆 Top 10 del Mes</h3>
          {top10.length===0&&<p style={d.muted}>Sin datos para el mes actual.</p>}
          {top10.map(([nombre,cnt],i)=>(
            <div key={nombre} style={{marginBottom:"10px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
                <span style={{fontSize:"12px",color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"78%"}}>{i+1}. {nombre}</span>
                <span style={{fontSize:"12px",fontWeight:700,color:"var(--accent)",flexShrink:0}}>{cnt}</span>
              </div>
              <div style={{height:"6px",borderRadius:"3px",background:"var(--bg-input)"}}>
                <div style={{height:"100%",borderRadius:"3px",background:"var(--accent)",width:`${Math.round((cnt/top10max)*100)}%`,transition:"width .4s"}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Fila 3 — Línea hoy + Torta perfil + Barras módulo */}
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:"14px",marginBottom:"18px"}}>

        {/* Línea de tiempo hoy */}
        <div style={{...d.card,overflowX:"auto"}}>
          <h3 style={d.h3}>📈 Ingresos vs Egresos — Hoy por hora</h3>
          <div style={{display:"flex",alignItems:"flex-end",gap:"3px",height:"100px",paddingBottom:"2px"}}>
            {lineaHoy.map(({h,ing,eg})=>(
              <div key={h} title={`${h}h — Ing:${ing} Eg:${eg}`} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",height:"100%",justifyContent:"flex-end"}}>
                <div style={{width:"100%",display:"flex",gap:"1px",justifyContent:"center",alignItems:"flex-end",height:"100%"}}>
                  <div style={{flex:1,borderRadius:"2px 2px 0 0",background:"var(--green-dark)",height:`${Math.round((ing/lineaMax)*100)}%`,minHeight:ing?"2px":"0"}}/>
                  <div style={{flex:1,borderRadius:"2px 2px 0 0",background:"var(--red-dark)",height:`${Math.round((eg/lineaMax)*100)}%`,minHeight:eg?"2px":"0"}}/>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:"3px",marginTop:"4px"}}>
            {lineaHoy.map(({h})=>(
              <div key={h} style={{flex:1,textAlign:"center",fontSize:"9px",color:"var(--text-dim)"}}>{h%4===0?h:""}</div>
            ))}
          </div>
          <div style={{display:"flex",gap:"14px",marginTop:"8px"}}>
            <div style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"var(--text-muted)"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"2px",background:"var(--green-dark)"}}/> Ingresos
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"5px",fontSize:"11px",color:"var(--text-muted)"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"2px",background:"var(--red-dark)"}}/> Egresos
            </div>
          </div>
        </div>

        {/* Torta perfil */}
        <div style={d.card}>
          <h3 style={d.h3}>🥧 Por Perfil</h3>
          <div style={{width:"100px",height:"100px",borderRadius:"50%",background:`conic-gradient(${conicStops})`,margin:"0 auto 14px",boxShadow:"0 2px 12px rgba(0,0,0,0.3)"}}/>
          {perfilData.map(p=>(
            <div key={p.perfil} style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"5px"}}>
              <div style={{width:"10px",height:"10px",borderRadius:"2px",background:p.color,flexShrink:0}}/>
              <span style={{fontSize:"11px",color:"var(--text)",flex:1}}>{p.perfil}</span>
              <span style={{fontSize:"11px",color:"var(--text-muted)",fontWeight:700}}>{p.pct}%</span>
            </div>
          ))}
          {perfilData.length===0&&<p style={{...d.muted,fontSize:"11px"}}>Sin datos</p>}
        </div>

        {/* Barras módulo */}
        <div style={d.card}>
          <h3 style={d.h3}>📦 Por Módulo</h3>
          {moduloData.map(m=>(
            <div key={m.k} style={{marginBottom:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                <span style={{fontSize:"12px",color:"var(--text)"}}>{m.label}</span>
                <span style={{fontSize:"12px",fontWeight:700,color:m.color}}>{m.cnt}</span>
              </div>
              <div style={{height:"8px",borderRadius:"4px",background:"var(--bg-input)"}}>
                <div style={{height:"100%",borderRadius:"4px",background:m.color,width:`${m.pct}%`,transition:"width .4s"}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Fila 4 — Anomalías */}
      <div className="g2" style={d.g2}>

        {/* Ingresos sin egreso >4h */}
        <div style={d.card}>
          <h3 style={{...d.h3,color:"var(--amber-t)"}}>⚠️ Sin Egreso {">"} 4 horas</h3>
          {sinEgreso.length===0&&<p style={d.muted}>Sin anomalías detectadas.</p>}
          {sinEgreso.map(r=>{
            const mins=Math.round((ahora-new Date(r.fechaHora))/60000);
            return(
              <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                <div>
                  <div style={{fontSize:"13px",fontWeight:600,color:"var(--text)"}}>{r.nombre||r.id}</div>
                  <div style={{fontSize:"11px",color:"var(--text-muted)"}}>{r.perfil} · {fmtDate(r.fechaHora)}</div>
                </div>
                <div style={{fontSize:"12px",fontWeight:700,color:"var(--amber-t)",flexShrink:0,marginLeft:"8px"}}>{fmtMin(mins)}</div>
              </div>
            );
          })}
        </div>

        {/* Egresos tempranos últimos 7 días por perfil */}
        <div style={d.card}>
          <h3 style={{...d.h3,color:"var(--red-t)"}}>⏱️ Egresos Tempranos — 7 días</h3>
          {egresosTempPerfil.length===0&&<p style={d.muted}>Sin egresos tempranos en los últimos 7 días.</p>}
          {egresosTempPerfil.map(([perfil,cnt])=>(
            <div key={perfil} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
              <span style={{fontSize:"13px",color:"var(--text)"}}>{perfil}</span>
              <span style={{fontSize:"13px",fontWeight:700,color:"var(--red-t)"}}>{cnt}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

      {tab==="backend"&&(
        <div style={d.card}>
          <h3 style={d.h3}>🔗 Backend Node.js</h3>
          <p style={{...d.muted,fontSize:"12px",marginBottom:"16px",lineHeight:1.7}}>El backend está conectado a Render + Neon PostgreSQL. Cada registro se guarda primero localmente y luego se sincroniza automáticamente.</p>
          <div style={{padding:"12px 16px",background:"var(--green-bg)",border:"1px solid var(--green)",borderRadius:"var(--radius)",fontSize:"12px",color:"var(--green-t)",marginBottom:"16px"}}>
            ✅ <strong>Backend activo:</strong> {BACKEND_URL}
          </div>
          <div style={{background:"var(--bg-input)",borderRadius:"var(--radius)",padding:"14px",fontFamily:"monospace",fontSize:"11px",color:"var(--text-muted)",lineHeight:2,borderLeft:"2px solid var(--border-light)"}}>
            {"GET  " + BACKEND_URL + "/api/ping"}<br/>
            {"GET  " + BACKEND_URL + "/api/registros"}<br/>
            {"POST " + BACKEND_URL + "/api/registros"}<br/>
            {"GET  " + BACKEND_URL + "/api/config"}<br/>
            {"POST " + BACKEND_URL + "/api/config"}
          </div>
        </div>
      )}
    </div>
  );
}

   APP ROOT

function App(){
  const[user,setUser]=useState(null);
  const[view,setView]=useState("dashboard");
  const[registros,setRegistros]=useState([]);
  const[cfg,setCfg]=useState(DEF_CFG);
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
  const[sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(()=>{
    (async()=>{
      // Detectar config corrupta: jefes/oficinaTecnica no deberían tener más de 50 items
      // ni contener palabras de proveedores como "S.A." o "S.R.L."
      const esCfgCorrupta=(cfg)=>{
        const tieneProv=(arr)=>{
          if(!arr||!arr.length)return false;
          if(arr.length>60)return true; // proveedores son 278, jefes son ~34
          return arr.some(n=>{
            const s=(n||"").toUpperCase();
            return s.includes(" S.A")||s.includes("S.R.L")||s.includes(" SRL")||s.includes(" SA ");
          });
        };
        return tieneProv(cfg.jefes)||tieneProv(cfg.oficinaTecnica);
      };

      // 1. Config local solo como fallback — siempre esperamos el backend
      const localCfg=await stGet("porteria_v2_cfg",null);
      let cfg=DEF_CFG; // siempre arrancamos con defaults, backend los pisa

      // 2. Cargar desde backend (sobreescribe local si es válida)
      try{
        const [resReg,resCfg]=await Promise.all([
          fetch(BACKEND_URL+"/api/registros").then(r=>r.json()).catch(()=>({ok:false})),
          fetch(BACKEND_URL+"/api/config").then(r=>r.json()).catch(()=>({ok:false})),
        ]);

        // Registros desde backend
        if(resReg.ok&&resReg.data&&resReg.data.length>0){
          const regs=resReg.data.map(r=>({
            id:r.id,fechaHora:r.fecha_hora,tipoOp:r.tipo_op,
            perfil:r.perfil,nombre:r.nombre,remito:r.remito,
            detalle:r.detalle,estado:r.estado,obs:r.obs,
            modulo:r.modulo,egresoTemprano:r.egreso_temprano,
            grupoId:r.grupo_id,usuario:r.usuario,
          }));
          setRegistros(regs);
          await stSet("porteria_v2_reg",regs);
        } else {
          const localReg=await stGet("porteria_v2_reg",[]);
          setRegistros(localReg);
        }

        // Config desde backend — solo aplicar si no está corrupta
        if(resCfg.ok&&resCfg.data&&Object.keys(resCfg.data).length>0){
          if(esCfgCorrupta(resCfg.data)){
            // Backend tiene datos corruptos → pisarlos con defaults
            console.warn("Config corrupta en backend, reseteando...");
            fetch(BACKEND_URL+"/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(DEF_CFG)}).catch(()=>{});
          } else {
            cfg={...DEF_CFG,...resCfg.data};
          }
        }
      }catch(e){
        console.warn("Backend no disponible, usando cache local:",e);
        const localReg=await stGet("porteria_v2_reg",[]);
        setRegistros(localReg);
        // Si backend no está disponible, usar config local como fallback
        if(localCfg&&!esCfgCorrupta(localCfg)) cfg={...DEF_CFG,...localCfg};
      }

      await stSet("porteria_v2_cfg",cfg);
      setCfg(cfg);
      setLoading(false);
    })();
  },[]);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  // ── Envío a Google Sheets sin CORS ──────────────────────────────
  // Usar text/plain + no-cors evita el preflight OPTIONS que GAS rechaza
  // cuando la app se abre desde file:// o un dominio no autorizado.
  // La respuesta es opaca (no-cors) pero no la necesitamos: los datos
  // ya están guardados localmente antes de llamar a esta función.
  const enviarAlBackend=async(lote)=>{
    try{
      const esLote = Array.isArray(lote) && lote.length > 1;
      const url    = esLote ? `${BACKEND_URL}/api/registros/lote` : `${BACKEND_URL}/api/registros`;
      const body   = esLote ? lote : lote[0];
      const res = await fetch(url,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(body),
      });
      const data = await res.json();
      if(!data.ok) console.warn("Backend sync error:",data.error);
    }catch(err){console.warn("Backend sync (ignorado):",err);}
  };

  const addRegistros=async(lote)=>{
    // 1. Guardar local PRIMERO — funciona siempre, con o sin internet
    const next=[...registros,...lote];
    setRegistros(next);
    await stSet("porteria_v2_reg",next);
    const ids=[...new Set(lote.map(r=>r.id))];
    showToast(`✓ ${ids.join(" + ")} guardado${ids.length>1?"s":""} correctamente`);
    // 2. Sync backend en segundo plano (fire & forget, no bloquea UI)
    enviarAlBackend(lote);
  };

  const saveCfg=async(nc)=>{
    setCfg(nc);await stSet("porteria_v2_cfg",nc);showToast("✓ Configuración guardada");
    // Sync config con backend
    try{
      await fetch(`${BACKEND_URL}/api/config`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(nc)});
    }catch(_){}
  };
  const nextId=()=>new Set(registros.map(r=>r.id)).size+1;

  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"16px"}}>
      <CarrefourLogo size={32}/>
      <div style={{color:"var(--text-muted)",fontSize:"13px"}}>Cargando sistema...</div>
    </div>
  );

  if(!user)return <LoginScreen onLogin={setUser}/>;

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      <Sidebar view={view} setView={(v)=>{setView(v);setSidebarOpen(false);}} user={user} onLogout={()=>{setUser(null);setView("dashboard");}} sidebarOpen={sidebarOpen}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:"100vh",marginLeft:"var(--sidebar-w)"}}>
        <Header view={view} onMenuToggle={()=>setSidebarOpen(p=>!p)}/>
        <main style={{flex:1,padding:"24px 28px",overflow:"auto"}}><div style={{maxWidth:"1100px",margin:"0 auto"}}>
          {view==="dashboard"&&<Dashboard registros={registros} setView={setView}/>}
          {view==="analytics"&&<Analytics registros={registros}/>}
          {view==="nueva"&&<NuevaOp registros={registros} cfg={cfg} user={user} addRegistros={addRegistros} nextId={nextId} setView={setView}/>}
          {view==="generadores"&&<Generadores registros={registros} cfg={cfg} user={user} addRegistros={addRegistros} nextId={nextId} setView={setView}/>}
          {view==="historial"&&<Historial registros={registros}/>}
          {view==="tempranos"&&<EgresosTemprano registros={registros} addRegistros={addRegistros} nextId={nextId} user={user}/>}
          {view==="admin"&&user.role==="admin"&&<Admin cfg={cfg} saveCfg={saveCfg}/>}
        </div></main>
        <Footer/>
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
