function Badge({tipo,small,egresoTemprano}){
  const ok=tipo==="INGRESO";
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:"4px",fontSize:small?"10px":"12px",fontWeight:700,padding:small?"2px 7px":"4px 10px",borderRadius:"6px",background:ok?"var(--green-bg)":"var(--red-bg)",color:ok?"var(--green-t)":"var(--red-t)",border:`1px solid ${ok?"var(--green-dark)":"var(--red-dark)"}`}}>
      {ok?"▶":"◀"} {ok?"INGRESO":"EGRESO"}
      {egresoTemprano&&<span style={{fontSize:"9px",background:"var(--amber-bg)",color:"var(--amber-t)",padding:"1px 4px",borderRadius:"4px",marginLeft:"2px"}}>TEMP</span>}

  );
}

function Toast({msg,type}){
  return <div style={{position:"fixed",bottom:"28px",right:"28px",zIndex:9999,padding:"12px 22px",borderRadius:"var(--radius-lg)",background:type==="error"?"#3d0f0f":"#0a2018",border:`1px solid ${type==="error"?"var(--red-dark)":"var(--green-dark)"}`,color:type==="error"?"var(--red-t)":"var(--green-t)",fontSize:"13px",fontWeight:600,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>{msg}</div>;
}

function AutoInput({options=[],value,onChange,placeholder,error}){
  const[open,setOpen]=useState(false);
  const[focused,setFocused]=useState(false);
  const q=value.toLowerCase();
  const filtered=useMemo(()=>options.filter(o=>o.toLowerCase().includes(q)&&o!==value).slice(0,12),[options,q,value]);
  const show=open&&focused&&filtered.length>0;
  return(
    <div style={{position:"relative"}}>
      <input style={{...d.input,borderColor:error?"var(--red-dark)":undefined}} value={value}
        onChange={e=>{onChange(e.target.value);setOpen(true);}}
        onFocus={()=>{setFocused(true);setOpen(true);}}
        onBlur={()=>setTimeout(()=>setFocused(false),160)}
        placeholder={placeholder}/>
      {show&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:200,background:"#1c1f30",border:"1px solid var(--border-light)",borderRadius:"var(--radius)",marginTop:"2px",maxHeight:"220px",overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,0.5)"}}>
          {filtered.map(opt=>(
            <div key={opt} onMouseDown={()=>{onChange(opt);setOpen(false);}} style={{padding:"9px 13px",cursor:"pointer",fontSize:"13px",color:"var(--text)",borderBottom:"1px solid var(--border)"}} onMouseEnter={e=>e.target.style.background="var(--bg-hover)"} onMouseLeave={e=>e.target.style.background="transparent"}>{opt}</div>
          ))}
        </div>
      )}
      {error&&<span style={d.err}>{error}</span>}
    </div>
  );
}

function Toggle({checked,onChange,label,accent}){
  const col=accent||"var(--accent)";
  return(
    <label style={d.toggle} onClick={()=>onChange(!checked)}>
      <div style={{width:"40px",height:"22px",borderRadius:"11px",background:checked?col:"var(--border-light)",position:"relative",transition:"background .2s",flexShrink:0}}>
        <div style={{position:"absolute",top:"3px",left:checked?"21px":"3px",width:"16px",height:"16px",borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
      </div>
      <span style={{fontSize:"13px",color:checked?"var(--text)":"var(--text-muted)",fontWeight:checked?600:400}}>{label}</span>
    </label>
  );
}

    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg-deep)",padding:"20px"}}>

      </div>
      <div style={{...d.card,width:"100%",maxWidth:"380px",boxShadow:"0 20px 60px rgba(0,0,0,0.6)"}}>
        <div style={{textAlign:"center",marginBottom:"24px"}}>

          <div style={{fontSize:"18px",fontWeight:700,color:"var(--text)"}}>Iniciar Sesión</div>
        </div>
        <form onSubmit={go}>
          <div style={d.sec}><label style={d.label}>Usuario</label><input style={d.input} value={usr} onChange={e=>setUsr(e.target.value)} placeholder="admin / porteria" autoFocus/></div>

/* ═══════════════════════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════════════════════ */
function Dashboard({registros,setView}){
  const today=new Date().toDateString();
  const stats=useMemo(()=>{
    const todayR=registros.filter(r=>new Date(r.fechaHora).toDateString()===today);
    const ingH=new Set(todayR.filter(r=>r.tipoOp==="INGRESO").map(r=>r.id)).size;
    const egH=new Set(todayR.filter(r=>r.tipoOp==="EGRESO").map(r=>r.id)).size;
    const genDentro=new Set(registros.filter(r=>r.modulo==="generador"&&r.tipoOp==="INGRESO").map(r=>r.id)).size;
    const total=new Set(registros.map(r=>r.id)).size;
    const abiertos=registros.filter(r=>r.tipoOp==="INGRESO"&&!r.egresoTemprano).filter(r=>{
      const egIds=new Set(registros.filter(x=>x.tipoOp==="EGRESO"&&x.grupoId===r.grupoId).map(x=>x.grupoId));
      return!egIds.has(r.grupoId);
    });
    return{ingH,egH,genDentro,total,abiertos:new Set(abiertos.map(r=>r.grupoId)).size};
  },[registros,today]);
  const recent=useMemo(()=>{const seen=new Set();return[...registros].reverse().filter(r=>{if(seen.has(r.id))return false;seen.add(r.id);return true;}).slice(0,10);},[registros]);
  const SC=[
    {l:"Ingresos hoy",v:stats.ingH,bg:"var(--green-bg)",c:"var(--green-t)",bd:"var(--green-dark)"},
    {l:"Egresos hoy",v:stats.egH,bg:"var(--red-bg)",c:"var(--red-t)",bd:"var(--red-dark)"},
    {l:"Registros abiertos",v:stats.abiertos,bg:"var(--amber-bg)",c:"var(--amber-t)",bd:"var(--amber)"},
    {l:"Generadores activos",v:stats.genDentro,bg:"var(--blue-bg)",c:"var(--blue-t)",bd:"var(--accent)"},
  ];
  return(
    <div style={{maxWidth:"960px"}}>
      <div className="g4" style={{...d.g4,marginBottom:"20px"}}>
        {SC.map(s=>(
          <div key={s.l} style={{background:s.bg,border:`1px solid ${s.bd}`,borderRadius:"var(--radius-lg)",padding:"1.1rem 1.2rem"}}>
            <div style={{fontSize:"32px",fontWeight:800,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:"12px",color:s.c,opacity:.75,marginTop:"4px",fontWeight:500}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,minmax(0,1fr))",gap:"14px",marginBottom:"20px"}}>
        {[{icon:"➕",l:"Nueva Operación",desc:"Registrar ingreso o egreso",v:"nueva"},{icon:"⚡",l:"Grupo Electrógeno",desc:"Módulo generadores",v:"generadores"},{icon:"📋",l:"Historial",desc:"Consultar y exportar",v:"historial"}].map(item=>(
          <button key={item.v} onClick={()=>setView(item.v)} style={{...d.card,cursor:"pointer",textAlign:"left",border:"1px solid var(--border-light)",transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border-light)"}>
            <div style={{fontSize:"24px",marginBottom:"8px"}}>{item.icon}</div>
            <div style={{fontSize:"14px",fontWeight:700,color:"var(--text)"}}>{item.l}</div>
            <div style={{fontSize:"12px",color:"var(--text-muted)",marginTop:"3px"}}>{item.desc}</div>
          </button>
        ))}
      </div>
      <div style={d.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
          <h3 style={{...d.h3,margin:0}}>Actividad reciente</h3>
          <span style={{fontSize:"11px",color:"var(--text-dim)"}}>{recent.length} operaciones</span>
        </div>
        {recent.length===0?(
          <div style={{textAlign:"center",padding:"40px 0",color:"var(--text-muted)"}}>Sin registros. Comenzá cargando la primera operación.</div>
        ):(
          recent.map((r,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:i<recent.length-1?"1px solid var(--border)":"none"}}>
              <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                <Badge tipo={r.tipoOp} small egresoTemprano={r.egresoTemprano}/>
                <div>
                  <div style={{fontSize:"13px",fontWeight:600,color:"var(--text)"}}>{r.nombre}</div>
                  <div style={{fontSize:"11px",color:"var(--text-muted)"}}>{r.perfil}{r.modulo==="generador"?" · ⚡ Generador":""}</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"monospace",fontSize:"12px",fontWeight:700,color:"var(--accent)"}}>{r.id}</div>
                <div style={{fontSize:"11px",color:"var(--text-muted)"}}>{fmtDate(r.fechaHora)}</div>
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   NUEVA OPERACIÓN
═══════════════════════════════════════════════════════ */
function NuevaOp({registros,cfg,user,addRegistros,nextId,setView}){
  const[tipoOp,setTipoOp]=useState("INGRESO");
  const[perfil,setPerfil]=useState("Proveedor");
  const[nombre,setNombre]=useState("");
  const[remitos,setRemitos]=useState([{id:1,remito:"",detalle:"",estado:"Nuevo",obs:""}]);
  const[obsOtro,setObsOtro]=useState("");
  const[saving,setSaving]=useState(false);
  const[errors,setErrors]=useState({});
  // EGRESO TEMPRANO
  const[egresoTemprano,setEgresoTemprano]=useState(false);
  const[egresoFecha,setEgresoFecha]=useState(()=>{const n=new Date();n.setHours(n.getHours()+1);return n.toISOString().slice(0,16);});
  const[egresoObs,setEgresoObs]=useState("");

  const perfiles=["Proveedor","Oficina Técnica","Jefe","Otro"];
  const getNombres=()=>{if(perfil==="Proveedor")return cfg.proveedores;if(perfil==="Oficina Técnica")return cfg.oficinaTecnica;if(perfil==="Jefe")return cfg.jefes;return[];};
  const addRem=()=>setRemitos(p=>[...p,{id:Date.now(),remito:"",detalle:"",estado:"Nuevo",obs:""}]);
  const updRem=(id,upd)=>setRemitos(p=>p.map(r=>r.id===id?{...r,...upd}:r));
  const delRem=(id)=>setRemitos(p=>p.filter(r=>r.id!==id));

  const validate=()=>{
    const e={};
    if(!nombre.trim())e.nombre="Ingresá el nombre o empresa";
    if(perfil!=="Otro")remitos.forEach((r,i)=>{if(!r.remito.trim())e[`r${i}`]="Nro de remito requerido";});
    if(egresoTemprano&&tipoOp==="INGRESO"&&!egresoFecha)e.egresoFecha="Ingresá la fecha/hora de egreso";
    setErrors(e);return!Object.keys(e).length;
  };

  const reset=()=>{setNombre("");setObsOtro("");setEgresoTemprano(false);setEgresoObs("");setErrors({});setRemitos([{id:1,remito:"",detalle:"",estado:"Nuevo",obs:""}]);};

  const handleSubmit=async()=>{
    if(!validate())return;setSaving(true);
    const n=nextId();const inId=genId("INGRESO",n);const now=nowISO();
    const grupoId=`GRP-${n}`;
    const base={grupoId,fechaHora:now,perfil,nombre:nombre.trim(),modulo:"general",usuario:user.name};
    const lote=[];

    // Construir registros de INGRESO (o EGRESO directo si tipoOp===EGRESO)
    if(perfil==="Otro"||remitos.length===0){
      const id=genId(tipoOp,n);
      lote.push({...base,id,idOperacion:id,tipoOp,remito:"N/A",detalle:"N/A",estado:"N/A",obs:obsOtro||"Sin remitos"});
    }else{
      for(const r of remitos){
        const id=genId(tipoOp,n);
        lote.push({...base,id,idOperacion:id,tipoOp,remito:r.remito,detalle:r.detalle,estado:r.estado,obs:r.obs||obsOtro||"N/A"});
      }
    }

    // Si es INGRESO + egreso temprano, agregar registros de EGRESO
    if(tipoOp==="INGRESO"&&egresoTemprano){
      const en2=nextId()+lote.length;
      const egId=genId("EGRESO",en2);
      const egBase={...base,id:egId,idOperacion:egId,tipoOp:"EGRESO",fechaHora:new Date(egresoFecha).toISOString(),egresoTemprano:true,obs:egresoObs||"Egreso temprano programado"};
      if(perfil==="Otro"||remitos.length===0){
        lote.push({...egBase,remito:"N/A",detalle:"N/A",estado:"N/A"});
      }else{
        for(const r of remitos){
          lote.push({...egBase,remito:r.remito,detalle:r.detalle,estado:r.estado});
        }
      }
    }

    await addRegistros(lote);
    setSaving(false);reset();setView("dashboard");
  };

  return(
    <div style={{maxWidth:"700px"}}>
      {/* Tipo Op */}
      <div style={{...d.card,marginBottom:"16px"}}>
        <label style={d.label}>Tipo de Operación</label>
        <div style={{display:"flex",gap:"8px",marginTop:"6px"}}>
          {["INGRESO","EGRESO"].map(t=>(
            <button key={t} onClick={()=>{setTipoOp(t);setEgresoTemprano(false);}} style={{flex:1,padding:"12px",borderRadius:"var(--radius)",border:`1px solid ${tipoOp===t?(t==="INGRESO"?"var(--green-dark)":"var(--red-dark)"):"var(--border)"}`,cursor:"pointer",fontWeight:700,fontSize:"15px",background:tipoOp===t?(t==="INGRESO"?"var(--green-bg)":"var(--red-bg)"):"transparent",color:tipoOp===t?(t==="INGRESO"?"var(--green-t)":"var(--red-t)"):"var(--text-muted)",transition:"all .15s"}}>
              {t==="INGRESO"?"▶ INGRESO":"◀ EGRESO"}
            </button>
          ))}
        </div>
        {/* Egreso Temprano toggle — solo en INGRESO */}
        {tipoOp==="INGRESO"&&(
          <div style={{marginTop:"14px",padding:"12px",background:"var(--amber-bg)",border:"1px solid var(--amber)",borderRadius:"var(--radius)"}}>
            <Toggle checked={egresoTemprano} onChange={setEgresoTemprano} label="Registrar egreso temprano" accent="var(--amber)"/>
            {egresoTemprano&&(
              <div className="g2" style={{...d.g2,marginTop:"12px"}}>
                <div>
                  <label style={d.label}>Fecha y hora de egreso</label>
                  <input type="datetime-local" style={{...d.input,borderColor:errors.egresoFecha?"var(--red-dark)":undefined}} value={egresoFecha} onChange={e=>setEgresoFecha(e.target.value)}/>
                  {errors.egresoFecha&&<span style={d.err}>{errors.egresoFecha}</span>}
                </div>
                <div>
                  <label style={d.label}>Observaciones de egreso</label>
                  <input style={d.input} value={egresoObs} onChange={e=>setEgresoObs(e.target.value)} placeholder="Motivo del egreso temprano"/>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Perfil + Nombre */}
      <div style={{...d.card,marginBottom:"16px"}}>
        <div className="g2" style={d.g2}>
          <div>
            <label style={d.label}>Perfil</label>
            <select style={d.input} value={perfil} onChange={e=>{setPerfil(e.target.value);setNombre("");setErrors({});}}>
              {perfiles.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div>
            <label style={d.label}>{perfil==="Proveedor"?"Empresa / Proveedor":"Nombre"}</label>
            {perfil==="Otro"
              ?<input style={{...d.input,borderColor:errors.nombre?"var(--red-dark)":undefined}} value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Nombre completo"/>
              :<AutoInput options={getNombres()} value={nombre} onChange={setNombre} placeholder="Escribir para buscar..." error={errors.nombre}/>
            }
            {perfil==="Otro"&&errors.nombre&&<span style={d.err}>{errors.nombre}</span>}
          </div>
        </div>
      </div>

      {/* Remitos */}
      {perfil!=="Otro"?(
        <>
          {remitos.map((r,i)=>(
            <RemitoCard key={r.id} rem={r} idx={i} onUpd={u=>updRem(r.id,u)} onDel={()=>delRem(r.id)} estados={cfg.estadosMaterial} canDel={remitos.length>1}/>
          ))}
          {errors[`r0`]&&<span style={{...d.err,display:"block",marginBottom:"8px"}}>{errors["r0"]}</span>}
          <button onClick={addRem} style={{...d.btnGhost,width:"100%",marginBottom:"16px",padding:"10px",borderStyle:"dashed"}}>+ Agregar remito</button>
        </>
      ):(
        <div style={{...d.card,marginBottom:"16px"}}><label style={d.label}>Observaciones / Detalle</label><textarea style={{...d.input,height:"100px",resize:"vertical"}} value={obsOtro} onChange={e=>setObsOtro(e.target.value)} placeholder="Detallá el motivo..."/></div>
      )}

      <button onClick={handleSubmit} disabled={saving} style={{...(egresoTemprano?d.btnSuccess:d.btnPrimary),width:"100%",padding:"14px",fontSize:"15px",opacity:saving?.6:1}}>
        {saving?"Guardando...":(egresoTemprano?"💾 Guardar Ingreso + Egreso Temprano":"💾 Guardar Registro")}
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   GENERADORES
═══════════════════════════════════════════════════════ */
function Generadores({registros,cfg,user,addRegistros,nextId,setView}){
  const[tipoOp,setTipoOp]=useState("INGRESO");
  const[proveedor,setProveedor]=useState("");
  const[tecnico,setTecnico]=useState("");
  const[modelo,setModelo]=useState("");
  const[motivo,setMotivo]=useState(DEF_CFG.motivosGenerador[0]);
  const[obs,setObs]=useState("");
  const[saving,setSaving]=useState(false);
  const[errors,setErrors]=useState({});
  const[egresoTemprano,setEgresoTemprano]=useState(false);
  const[egresoFecha,setEgresoFecha]=useState(()=>{const n=new Date();n.setHours(n.getHours()+2);return n.toISOString().slice(0,16);});
  const[egresoObs,setEgresoObs]=useState("");

  const genList=useMemo(()=>{const seen=new Set();return[...registros].filter(r=>r.modulo==="generador").filter(r=>{if(!seen.has(r.id)){seen.add(r.id);return true;}return false;});},[registros]);
  
  const validate=()=>{const e={};if(!proveedor.trim())e.proveedor="Requerido";if(!modelo.trim())e.modelo="Requerido";setErrors(e);return!Object.keys(e).length;};
  
  const handleSubmit=async()=>{
    if(!validate())return;setSaving(true);
    const n=nextId();const id=genId(tipoOp,n);const grupoId=`GRP-${n}`;
    const base={id,idOperacion:id,grupoId,fechaHora:nowISO(),perfil:"Grupo Electrógeno",nombre:proveedor.trim(),remito:modelo.trim(),detalle:motivo,estado:tipoOp==="INGRESO"?"Dentro":"Retirado",obs:`Técnico: ${tecnico||"N/A"} | ${obs}`,tipoOp,modulo:"generador",proveedor:proveedor.trim(),tecnico,modelo:modelo.trim(),motivo,usuario:user.name};
    const lote=[base];
    if(tipoOp==="INGRESO"&&egresoTemprano){
      const n2=nextId()+1;const egId=genId("EGRESO",n2);
      lote.push({...base,id:egId,idOperacion:egId,tipoOp:"EGRESO",fechaHora:new Date(egresoFecha).toISOString(),estado:"Retirado",egresoTemprano:true,obs:`Egreso temprano: ${egresoObs||motivo}`});
    }
    await addRegistros(lote);setSaving(false);setProveedor("");setTecnico("");setModelo("");setObs("");setEgresoTemprano(false);setErrors({});setView("dashboard");
  };

  return(
    <div style={{maxWidth:"700px"}}>
      <div style={{background:"var(--amber-bg)",border:"1px solid var(--amber)",borderRadius:"var(--radius-lg)",padding:"13px 18px",marginBottom:"18px",display:"flex",alignItems:"center",gap:"13px"}}>
        <span style={{fontSize:"26px"}}>⚡</span>
        <div><div style={{fontSize:"14px",fontWeight:700,color:"var(--amber-t)"}}>Módulo: Grupos Electrógenos</div><div style={{fontSize:"12px",color:"var(--amber)",opacity:.8}}>{genList.length} generador(es) registrado(s) en el sistema</div></div>
      </div>

      <div style={{...d.card,marginBottom:"16px"}}>
        <label style={d.label}>Tipo de Operación</label>
        <div style={{display:"flex",gap:"8px",marginTop:"6px"}}>
          {["INGRESO","EGRESO"].map(t=>(
            <button key={t} onClick={()=>{setTipoOp(t);setEgresoTemprano(false);}} style={{flex:1,padding:"12px",borderRadius:"var(--radius)",border:`1px solid ${tipoOp===t?(t==="INGRESO"?"var(--green-dark)":"var(--red-dark)"):"var(--border)"}`,cursor:"pointer",fontWeight:700,fontSize:"15px",background:tipoOp===t?(t==="INGRESO"?"var(--green-bg)":"var(--red-bg)"):"transparent",color:tipoOp===t?(t==="INGRESO"?"var(--green-t)":"var(--red-t)"):"var(--text-muted)"}}>
              {t==="INGRESO"?"▶ INGRESO":"◀ EGRESO"}
            </button>
          ))}
        </div>
        {tipoOp==="INGRESO"&&(
          <div style={{marginTop:"14px",padding:"12px",background:"var(--amber-bg)",border:"1px solid var(--amber)",borderRadius:"var(--radius)"}}>
            <Toggle checked={egresoTemprano} onChange={setEgresoTemprano} label="Registrar egreso temprano del generador" accent="var(--amber)"/>
            {egresoTemprano&&(
              <div className="g2" style={{...d.g2,marginTop:"12px"}}>
                <div><label style={d.label}>Fecha y hora de egreso</label><input type="datetime-local" style={d.input} value={egresoFecha} onChange={e=>setEgresoFecha(e.target.value)}/></div>
                <div><label style={d.label}>Observaciones de egreso</label><input style={d.input} value={egresoObs} onChange={e=>setEgresoObs(e.target.value)} placeholder="Motivo de salida"/></div>
              </div>
            )}
          </div>
        )}
      </div>

      <div style={{...d.card,marginBottom:"16px"}}>
        <div className="g2" style={{...d.g2,marginBottom:"12px"}}>
          <div><label style={d.label}>Empresa / Proveedor</label><AutoInput options={cfg.proveedores} value={proveedor} onChange={setProveedor} placeholder="Buscar proveedor..." error={errors.proveedor}/></div>
          <div><label style={d.label}>Técnico Responsable</label><input style={d.input} value={tecnico} onChange={e=>setTecnico(e.target.value)} placeholder="Nombre del técnico"/></div>
        </div>
        <div className="g2" style={{...d.g2,marginBottom:"12px"}}>
          <div><label style={d.label}>Equipo / Grupo Electrógeno</label><select style={{...d.input,borderColor:errors.modelo?"var(--red-dark)":undefined}} value={modelo} onChange={e=>setModelo(e.target.value)}><option value="">— Seleccionar equipo —</option>{(cfg.generadores||DEF_CFG.generadores).map(g=><option key={g}>{g}</option>)}</select>{errors.modelo&&<span style={d.err}>{errors.modelo}</span>}</div>
          <div><label style={d.label}>Motivo</label><select style={d.input} value={motivo} onChange={e=>setMotivo(e.target.value)}>{cfg.motivosGenerador.map(m=><option key={m}>{m}</option>)}</select></div>
        </div>
        <div><label style={d.label}>Observaciones generales</label><textarea style={{...d.input,height:"72px",resize:"vertical"}} value={obs} onChange={e=>setObs(e.target.value)} placeholder="Observaciones adicionales..."/></div>
      </div>

      <button onClick={handleSubmit} disabled={saving} style={{...(egresoTemprano?d.btnSuccess:d.btnPrimary),width:"100%",padding:"14px",fontSize:"15px",opacity:saving?.6:1,marginBottom:"22px"}}>
        {saving?"Guardando...":(egresoTemprano?"⚡ Registrar Ingreso + Egreso Temprano":"⚡ Registrar Grupo Electrógeno")}
      </button>

      {genList.length>0&&(
        <div style={d.card}>
          <h3 style={d.h3}>Generadores registrados</h3>
          {genList.map((g,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<genList.length-1?"1px solid var(--border)":"none"}}>
              <div><div style={{fontSize:"13px",fontWeight:600,color:"var(--text)"}}>{g.modelo||g.remito}</div><div style={{fontSize:"11px",color:"var(--text-muted)"}}>{g.nombre} · {g.motivo||g.detalle}</div></div>
              <Badge tipo={g.tipoOp} small egresoTemprano={g.egresoTemprano}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   HISTORIAL
═══════════════════════════════════════════════════════ */
function Historial({registros}){
  const[search,setSearch]=useState("");const[fTipo,setFTipo]=useState("TODOS");const[fPerfil,setFPerfil]=useState("TODOS");const[fFecha,setFFecha]=useState("");const[fModulo,setFModulo]=useState("TODOS");
  const perfiles=useMemo(()=>["TODOS",...new Set(registros.map(r=>r.perfil))],[registros]);
  const filtered=useMemo(()=>{
    const q=search.toLowerCase();
    return[...registros].reverse().filter(r=>{
      if(fTipo!=="TODOS"&&r.tipoOp!==fTipo)return false;
      if(fPerfil!=="TODOS"&&r.perfil!==fPerfil)return false;
      if(fModulo!=="TODOS"&&(r.modulo||"general")!==fModulo)return false;
      if(fFecha&&!r.fechaHora?.startsWith(fFecha))return false;
      if(q&&![r.nombre,r.remito,r.id,r.detalle,r.estado,r.usuario].some(v=>v?.toLowerCase().includes(q)))return false;
      return true;
    });
  },[registros,search,fTipo,fPerfil,fFecha,fModulo]);

  const exportCSV=()=>{
    const H=["ID","Fecha","Tipo Op","Perfil","Módulo","Nombre/Empresa","Remito/OT","Detalle","Estado","Observaciones","Egreso Temprano","Usuario"];
    const rows=filtered.map(r=>[r.id,fmtDate(r.fechaHora),r.tipoOp,r.perfil,r.modulo||"general",r.nombre,r.remito,r.detalle,r.estado,r.obs,r.egresoTemprano?"Sí":"No",r.usuario]);
    const csv=[H,...rows].map(row=>row.map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));a.download=`porteria_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };

  const th={padding:"9px 11px",fontSize:"11px",fontWeight:700,color:"var(--text-muted)",textAlign:"left",textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid var(--border-light)",whiteSpace:"nowrap",background:"#0e1020"};
  const td={padding:"9px 11px",fontSize:"12px",color:"var(--text)",borderBottom:"1px solid var(--border)"};

  return(
    <div>
      <div className="filter-row" style={{...d.card,marginBottom:"16px",display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:"12px"}}>
        <div><label style={d.label}>Búsqueda</label><input style={d.input} value={search} onChange={e=>setSearch(e.target.value)} placeholder="ID, nombre, remito..."/></div>
        <div><label style={d.label}>Operación</label><select style={d.input} value={fTipo} onChange={e=>setFTipo(e.target.value)}><option value="TODOS">Todos</option><option value="INGRESO">Ingreso</option><option value="EGRESO">Egreso</option></select></div>
        <div><label style={d.label}>Módulo</label><select style={d.input} value={fModulo} onChange={e=>setFModulo(e.target.value)}><option value="TODOS">Todos</option><option value="general">General</option><option value="generador">Generadores</option></select></div>
        <div><label style={d.label}>Perfil</label><select style={d.input} value={fPerfil} onChange={e=>setFPerfil(e.target.value)}>{perfiles.map(p=><option key={p}>{p}</option>)}</select></div>
        <div><label style={d.label}>Fecha</label><input type="date" style={d.input} value={fFecha} onChange={e=>setFFecha(e.target.value)}/></div>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
        <span style={d.muted}>{filtered.length} registro(s)</span>
        <button onClick={exportCSV} style={d.btnGhost}>📥 Exportar CSV/Excel</button>
      </div>
      <div style={{...d.card,overflowX:"auto",padding:0,borderRadius:"var(--radius-lg)"}}>
        {filtered.length===0?(
          <div style={{textAlign:"center",padding:"52px",color:"var(--text-muted)"}}>No hay registros con los filtros aplicados</div>
        ):(
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr>{["ID","Fecha","Op","Perfil","Nombre / Empresa","Remito / OT","Detalle","Estado","ET","Usuario"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
            <tbody>
              {filtered.map((r,i)=>(
                <tr key={i} onMouseEnter={e=>e.currentTarget.style.background="var(--bg-hover)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"} style={{transition:"background .1s"}}>
                  <td style={{...td,fontFamily:"monospace",color:"var(--accent)",fontWeight:700,whiteSpace:"nowrap"}}>{r.id}</td>
                  <td style={{...td,whiteSpace:"nowrap",fontSize:"11px",color:"var(--text-muted)"}}>{fmtDate(r.fechaHora)}</td>
                  <td style={td}><Badge tipo={r.tipoOp} small/></td>
                  <td style={{...td,fontSize:"11px"}}>{r.perfil}</td>
                  <td style={{...td,maxWidth:"160px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.nombre}</td>
                  <td style={{...td,fontFamily:"monospace",fontSize:"11px",color:"var(--text-muted)"}}>{r.remito}</td>
                  <td style={{...td,maxWidth:"140px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:"11px"}}>{r.detalle}</td>
                  <td style={{...td,fontSize:"11px"}}>{r.estado}</td>
                  <td style={td}>{r.egresoTemprano?<span style={{fontSize:"9px",background:"var(--amber-bg)",color:"var(--amber-t)",padding:"2px 5px",borderRadius:"4px",fontWeight:700}}>ET</span>:"—"}</td>
                  <td style={{...td,color:"var(--text-muted)",fontSize:"11px"}}>{r.usuario}</td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   LIST EDITOR (Admin)
═══════════════════════════════════════════════════════ */
function ListEditor({title,items,onSave}){
  const[list,setList]=useState([...items].sort());const[nItem,setNItem]=useState("");const[editing,setEditing]=useState(null);const[editVal,setEditVal]=useState("");
  const add=()=>{const v=nItem.trim();if(!v||list.includes(v))return;setList(p=>[...p,v].sort());setNItem("");};
  const del=(i)=>setList(p=>p.filter((_,idx)=>idx!==i));
  const saveEd=()=>{if(editVal.trim())setList(p=>p.map((it,i)=>i===editing?editVal.trim():it).sort());setEditing(null);};
  return(
    <div style={{...d.card,marginBottom:"14px"}}>
      <h3 style={d.h3}>{title} <span style={{fontSize:"11px",fontWeight:400,color:"var(--text-muted)"}}>({list.length})</span></h3>
      <div style={{maxHeight:"260px",overflowY:"auto",marginBottom:"12px"}}>
        {list.length===0&&<p style={{...d.muted,fontSize:"12px",textAlign:"center",padding:"16px 0"}}>Sin elementos. Agregá uno.</p>}
        {list.map((item,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:"8px",padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
            {editing===i
              ?<><input style={{...d.input,flex:1,padding:"6px 10px"}} value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEd();if(e.key==="Escape")setEditing(null);}} autoFocus/><button onClick={saveEd} style={{...d.btnPrimary,padding:"5px 12px",fontSize:"12px"}}>OK</button><button onClick={()=>setEditing(null)} style={{...d.btnGhost,padding:"5px 10px",fontSize:"12px"}}>✕</button></>
              :<><span style={{flex:1,fontSize:"13px",color:"var(--text)"}}>{item}</span><button onClick={()=>{setEditing(i);setEditVal(list[i]);}} style={{...d.btnGhost,padding:"4px 9px",fontSize:"11px"}}>✏️</button><button onClick={()=>del(i)} style={{...d.btnDanger,padding:"4px 9px",fontSize:"11px"}}>✕</button></>
            }
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:"8px",marginBottom:"12px"}}>
        <input style={{...d.input,flex:1}} value={nItem} onChange={e=>setNItem(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Nuevo elemento (Enter para agregar)..."/>
        <button onClick={add} style={d.btnPrimary}>+ Agregar</button>
      </div>
      <button onClick={()=>onSave(list)} style={{...d.btnPrimary,width:"100%"}}>💾 Guardar cambios</button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   ADMIN
═══════════════════════════════════════════════════════ */
function Admin({cfg,saveCfg}){
  const[tab,setTab]=useState("proveedores");const[gsUrl,setGsUrl]=useState(cfg.gsUrl||"");
  const tabs=[{id:"proveedores",label:"🏢 Proveedores",key:"proveedores"},{id:"oficina",label:"🔧 Oficina Técnica",key:"oficinaTecnica"},{id:"jefes",label:"👔 Jefes / Supervisores",key:"jefes"},{id:"generadores",label:"⚡ Equipos GE",key:"generadores"},{id:"estados",label:"📦 Estados Material",key:"estadosMaterial"},{id:"motivos",label:"🔧 Motivos GE",key:"motivosGenerador"},{id:"gs",label:"🔗 Google Sheets",key:null}];
  const ct=tabs.find(t=>t.id===tab);
  return(
    <div style={{maxWidth:"700px"}}>
      <div style={{background:"var(--purple-bg)",border:"1px solid var(--purple)",borderRadius:"var(--radius-lg)",padding:"13px 18px",marginBottom:"18px"}}>
        <div style={{fontSize:"14px",fontWeight:700,color:"var(--purple-t)"}}>⚙️ Panel de Administración</div>
        <div style={{fontSize:"12px",color:"var(--purple)",marginTop:"2px"}}>Configurá los valores dinámicos — los cambios impactan inmediatamente en los formularios</div>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:"7px",marginBottom:"18px"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 13px",borderRadius:"var(--radius)",border:`1px solid ${tab===t.id?"var(--purple)":"var(--border-light)"}`,background:tab===t.id?"var(--purple-bg)":"transparent",color:tab===t.id?"var(--purple-t)":"var(--text-muted)",fontSize:"12px",fontWeight:tab===t.id?700:500,cursor:"pointer"}}>
            {t.label}
          </button>
        ))}
      </div>
      {ct?.key&&<ListEditor title={ct.label} items={cfg[ct.key]||[]} onSave={(list)=>saveCfg({...cfg,[ct.key]:list})}/>}
      {tab==="gs"&&(
        <div style={d.card}>
          <h3 style={d.h3}>🔗 Integración Google Sheets</h3>
          <p style={{...d.muted,fontSize:"12px",marginBottom:"16px",lineHeight:1.7}}>Ingresá la URL de tu Apps Script Web App para sincronizar cada registro automáticamente con Google Sheets. Los datos se guardan localmente aunque no haya conexión.</p>
          <div style={{marginBottom:"10px"}}><label style={d.label}>URL del Web App</label><input style={d.input} value={gsUrl} onChange={e=>setGsUrl(e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"/></div>
          {gsUrl&&gsUrl.includes("/a/macros/")&&(
            <div style={{marginBottom:"12px",padding:"10px 12px",background:"var(--red-bg)",border:"1px solid var(--red-dark)",borderRadius:"var(--radius)",fontSize:"12px",color:"var(--red-t)"}}>
              ⛔ Esta URL tiene dominio corporativo (<code>/a/macros/carrefour.com/</code>) y va a dar 401. Necesitás una URL del tipo <code>/macros/s/...</code> — deployá el script con acceso <strong>"Cualquier persona"</strong>.
            </div>
          )}
          {gsUrl&&!gsUrl.includes("/a/macros/")&&gsUrl.includes("script.google.com")&&(
            <div style={{marginBottom:"12px",padding:"10px 12px",background:"var(--green-bg)",border:"1px solid var(--green-dark)",borderRadius:"var(--radius)",fontSize:"12px",color:"var(--green-t)"}}>
              ✓ URL correcta. Sync activo con Google Sheets.
            </div>
          )}
          <div style={{background:"var(--bg-input)",borderRadius:"var(--radius)",padding:"13px",marginBottom:"14px",fontSize:"11px",color:"var(--text-muted)",lineHeight:1.8,borderLeft:"2px solid var(--amber)"}}>
            <div style={{fontWeight:700,color:"var(--amber-t)",marginBottom:"6px"}}>⚙️ Cómo deployar correctamente:</div>
            1. Apps Script → Implementar → Nueva implementación<br/>
            2. Tipo: <strong>Aplicación web</strong><br/>
            3. Ejecutar como: <strong>Yo</strong><br/>
            4. Quién accede: <strong>Cualquier persona</strong> (NO "carrefour.com")<br/>
            5. La URL debe ser: <code>script.google.com/macros/s/...</code>
          </div>
          <div style={{background:"var(--bg-input)",borderRadius:"var(--radius)",padding:"12px",marginBottom:"14px",fontFamily:"monospace",fontSize:"11px",color:"var(--text-muted)",lineHeight:2,borderLeft:"2px solid var(--border-light)"}}>
            {"// En tu Apps Script (acepta text/plain por no-cors):\nfunction doPost(e) {\n  const data = JSON.parse(e.postData.contents);\n  guardarDatos(data);\n  return ContentService\n    .createTextOutput(JSON.stringify({ok:true}))\n    .setMimeType(ContentService.MimeType.JSON);\n}"}
          </div>
          <button onClick={()=>saveCfg({...cfg,gsUrl})} style={{...d.btnPrimary,width:"100%"}}>💾 Guardar URL</button>
        </div>
      )}
    </div>
  );
}

    <footer style={{textAlign:"center",padding:"16px 24px",borderTop:"1px solid var(--border)",background:"var(--bg-sidebar)"}}>
      <span style={{fontSize:"11px",color:"var(--text-dim)"}}>desarrollado por alexis plescia en 2026</span>

/* ═══════════════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════════════ */
function App(){
  const[user,setUser]=useState(null);
  const[view,setView]=useState("dashboard");
  const[registros,setRegistros]=useState([]);
  const[cfg,setCfg]=useState(DEF_CFG);
  const[loading,setLoading]=useState(true);
  const[toast,setToast]=useState(null);
  const[sidebarOpen,setSidebarOpen]=useState(false);

  useEffect(()=>{
    (async()=>{
      const[r,c]=await Promise.all([stGet("porteria_v2_reg",[]),stGet("porteria_v2_cfg",null)]);
      setRegistros(r);
      setCfg(c?{...DEF_CFG,...c}:DEF_CFG);
      setLoading(false);
    })();
  },[]);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  // Envío a GAS con no-cors para evitar preflight OPTIONS desde file://
  // Los datos YA están en localStorage antes de llamar esto.
  // La respuesta es opaque (no leíble), por eso el 401 aparece en consola
  // pero el código no lo ve y continúa normalmente.
  const syncSheets=useCallback(async(payload)=>{
    if(!cfg.gsUrl)return;
    // Validar que sea URL de GAS pública (sin /a/macros/DOMINIO/)
    if(cfg.gsUrl.includes("/a/macros/")){
      console.warn("[Sheets] La URL tiene dominio corporativo - requiere login. Usá una URL del tipo /macros/s/...");
      return;
    }
    try{
      await fetch(cfg.gsUrl,{
        method:"POST",
        mode:"no-cors",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify(payload),
      });
    }catch(e){console.warn("[Sheets] sync ignorado:",e.message);}
  },[cfg.gsUrl]);

  const addRegistros=async(lote)=>{
    // 1. Guardar local - siempre funciona
    const next=[...registros,...lote];
    setRegistros(next);
    await stSet("porteria_v2_reg",next);
    const ids=[...new Set(lote.map(r=>r.id))];
    showToast(`✓ ${ids.join(" + ")} guardado${ids.length>1?"s":""} correctamente`);
    // 2. Sync Sheets en background (fire & forget)
    syncSheets({action:lote.length===1?"guardar_registro":"guardar_lote",data:lote.length===1?lote[0]:lote});
  };

  const saveCfg=async(nc)=>{
    setCfg(nc);
    await stSet("porteria_v2_cfg",nc);
    showToast("✓ Configuración guardada");
    if(nc.gsUrl&&!nc.gsUrl.includes("/a/macros/")){
      try{await fetch(nc.gsUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"guardar_config",data:nc})});}catch(_){}
    }
  };
  const nextId=()=>new Set(registros.map(r=>r.id)).size+1;

  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"16px"}}>
      <CarrefourLogo size={32}/>
      <div style={{color:"var(--text-muted)",fontSize:"13px"}}>Cargando sistema...</div>
    </div>
  );

  if(!user)return <LoginScreen onLogin={setUser}/>;

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      <Sidebar view={view} setView={(v)=>{setView(v);setSidebarOpen(false);}} user={user} onLogout={()=>{setUser(null);setView("dashboard");}} sidebarOpen={sidebarOpen}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:"100vh",marginLeft:"var(--sidebar-w)"}}>
        <Header view={view} onMenuToggle={()=>setSidebarOpen(p=>!p)}/>
        <main style={{flex:1,padding:"24px 28px",overflow:"auto"}}>
          {view==="dashboard"&&<Dashboard registros={registros} setView={setView}/>}
          {view==="nueva"&&<NuevaOp registros={registros} cfg={cfg} user={user} addRegistros={addRegistros} nextId={nextId} setView={setView}/>}
          {view==="generadores"&&<Generadores registros={registros} cfg={cfg} user={user} addRegistros={addRegistros} nextId={nextId} setView={setView}/>}
          {view==="historial"&&<Historial registros={registros}/>}
          {view==="admin"&&user.role==="admin"&&<Admin cfg={cfg} saveCfg={saveCfg}/>}
        </main>
        <Footer/>
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
